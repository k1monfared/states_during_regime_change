# Indicator definitions for all 20 sub-indicators across 4 dimensions
# Each indicator defines: description, unit, valid_features (controlled vocabulary), primary_sources

political:
  territorial_control:
    description: "Percentage of country under effective central government control"
    unit: percent_territory_controlled
    valid_features:
      - full_control_no_challenges
      - minor_insurgencies_lt_10pct
      - significant_areas_outside_10_30pct
      - large_portions_contested_30_50pct
      - majority_outside_control
      - failed_state_no_authority
      - foreign_occupation
      - multiple_competing_authorities
    primary_sources:
      - "ICG reports"
      - "News analysis"
      - "Academic literature"

  political_violence:
    description: "Level of conflict-related deaths, terrorism, state repression"
    unit: conflict_deaths_per_year
    valid_features:
      - minimal_lt_100
      - low_100_500
      - moderate_500_2000
      - high_2000_10000
      - severe_10000_50000
      - catastrophic_gt_50000
    primary_sources:
      - "UCDP/PRIO Armed Conflict Dataset"
      - "ACLED"
      - "Uppsala Conflict Data Program"
    components:
      conflict_deaths:
        description: "Total direct conflict-related deaths per year (battle deaths + one-sided violence + non-state conflict; best estimate)"
        unit: persons_per_year
        source_code: "UCDP GED: sum of 'best' field by country-year"
        fallback: "ACLED fatalities field by country-year"
      population:
        description: "Total population (used for optional per-100k normalization only; not used in main value)"
        unit: persons
        source_code: "World Bank SP.POP.TOTL"
        fallback: "UN World Population Prospects"

  institutional_functioning:
    description: "Do state institutions (courts, legislature, bureaucracy, elections) operate?"
    unit: qualitative_scale
    valid_features:
      - fully_functional_democratic
      - functional_but_flawed
      - partially_functional
      - severely_degraded
      - collapsed_or_nominal
      - no_functioning_institutions
    primary_sources:
      - "V-Dem indices"
      - "Freedom House"
      - "Qualitative assessment"

  civil_liberties:
    description: "Freedom of expression, assembly, religion, movement"
    unit: freedom_house_inverted
    quantitative_transform: "(8 - value) / 7 * 100"
    valid_features:
      - full_freedoms
      - mostly_free_minor_restrictions
      - partially_free
      - significant_restrictions
      - severe_restrictions
      - no_civil_liberties
    primary_sources:
      - "Freedom House Civil Liberties score"

  elite_cohesion:
    description: "Is the ruling coalition stable or fragmenting? Risk of coups?"
    unit: qualitative_scale
    valid_features:
      - stable_unified_governance
      - minor_tensions_functional
      - significant_competition_managed
      - open_factional_conflict
      - active_power_struggles
      - complete_fragmentation
    primary_sources:
      - "Qualitative assessment"
      - "ICG reports"
      - "News analysis"

  military_expenditure:
    description: "Military spending as a share of GDP (higher spending = lower state health score)"
    unit: percent_gdp
    valid_features:
      - minimal_military_spending_lt_1pct
      - low_1_2pct
      - low_(1-2%)
      - moderate_2_4pct
      - moderate_(2-4%)
      - elevated_4_7pct
      - elevated_(4-7%)
      - high_7_15pct
      - high_(7-15%)
      - war_economy_gt_15pct
    primary_sources:
      - "World Bank MS.MIL.XPND.GD.ZS"
      - "SIPRI Military Expenditure Database"

  political_stability:
    description: "Perceptions of likelihood of political instability and politically motivated violence (WGI PV.EST; higher = more stable)"
    unit: wgi_estimate_minus3_to_plus3
    valid_features:
      - very_stable
      - stable
      - mild_instability
      - significant_instability
      - high_instability
      - extreme_instability_conflict
    primary_sources:
      - "World Bank Worldwide Governance Indicators (PV.EST)"

  government_effectiveness:
    description: "Perceptions of quality of public services, civil service, and policy formulation (WGI GE.EST; higher = better)"
    unit: wgi_estimate_minus3_to_plus3
    valid_features:
      - very_effective
      - effective
      - partially_effective
      - low_effectiveness
      - ineffective_or_captured
    primary_sources:
      - "World Bank Worldwide Governance Indicators (GE.EST)"

economic:
  gdp_per_capita:
    description: "Living standards relative to baseline (indexed to peak)"
    unit: usd_current_or_constant
    quantitative_transform: "(value / peak_value) * 100"
    valid_features:
      - above_peak
      - near_peak_90_100pct
      - moderate_decline_70_90pct
      - significant_decline_50_70pct
      - severe_decline_30_50pct
      - collapse_below_30pct
    primary_sources:
      - "World Bank"
      - "IMF"
    components:
      gdp_total:
        description: "Gross Domestic Product at current market prices"
        unit: usd_current
        source_code: "World Bank NY.GDP.MKTP.CD"
        fallback: "IMF WEO series NGDPD (current USD billions)"
      population:
        description: "Total mid-year population (all residents)"
        unit: persons
        source_code: "World Bank SP.POP.TOTL"
        fallback: "UN World Population Prospects"

  inflation:
    description: "Price stability (annual consumer price inflation rate)"
    unit: percent_annual
    valid_features:
      - low_lt_3pct
      - moderate_3_10pct
      - elevated_10_25pct
      - high_25_50pct
      - very_high_50_100pct
      - hyperinflation_gt_100pct
    primary_sources:
      - "World Bank"
      - "IMF"
      - "Central bank data"
    components:
      cpi_current_year:
        description: "Consumer Price Index for the current year (base year = 100)"
        unit: index_number
        source_code: "World Bank FP.CPI.TOTL (2010=100)"
        fallback: "IMF IFS CPI series"
      cpi_prior_year:
        description: "Consumer Price Index for the prior year (same series); used to derive the annual rate when direct rate series is unavailable"
        unit: index_number
        source_code: "World Bank FP.CPI.TOTL (prior year row)"
        fallback: "IMF IFS CPI series"

  unemployment:
    description: "Labor market health (official unemployment rate)"
    unit: percent_labor_force
    valid_features:
      - low_lt_5pct
      - moderate_5_10pct
      - elevated_10_15pct
      - high_15_25pct
      - very_high_25_40pct
      - crisis_gt_40pct
    primary_sources:
      - "World Bank"
      - "ILO"
    components:
      unemployed_persons:
        description: "Number of unemployed persons (ILO definition: without work, available, seeking)"
        unit: persons
        source_code: "ILO ILOSTAT: UNE_TUNE_SEX_AGE_NB"
        fallback: "World Bank SL.UEM.TOTL.NE.ZS numerator"
      labor_force:
        description: "Total labor force (employed + unemployed)"
        unit: persons
        source_code: "World Bank SL.TLF.TOTL.IN"
        fallback: "ILO ILOSTAT: EAP_TEAP_SEX_AGE_NB"

  trade_openness:
    description: "Economic integration with world ((Exports + Imports) / GDP)"
    unit: percent_gdp
    valid_features:
      - highly_open_gt_100pct
      - open_70_100pct
      - moderate_40_70pct
      - restricted_20_40pct
      - closed_lt_20pct
      - autarky_or_blockade
    primary_sources:
      - "World Bank"
    components:
      exports:
        description: "Exports of goods and services, current USD"
        unit: usd_current
        source_code: "World Bank NE.EXP.GNFS.CD"
        fallback: "IMF Direction of Trade Statistics (DOTS)"
      imports:
        description: "Imports of goods and services, current USD"
        unit: usd_current
        source_code: "World Bank NE.IMP.GNFS.CD"
        fallback: "IMF Direction of Trade Statistics (DOTS)"
      gdp:
        description: "GDP at current market prices, current USD (denominator)"
        unit: usd_current
        source_code: "World Bank NY.GDP.MKTP.CD"
        fallback: "IMF WEO series NGDPD"

  natural_resource_rents:
    description: "Total natural resource rents as % of GDP (resource-curse framing: high rents = structural vulnerability)"
    unit: percent_gdp
    valid_features:
      - minimal_lt_5pct
      - low_lt_10pct
      - moderate_5_15pct
      - moderate_(5-15%)
      - moderate_10_20pct
      - significant_15_30pct
      - significant_(15-30%)
      - high_20_40pct
      - high_(30-50%)
      - high_30_50pct
      - very_high_40_60pct
      - extremely_high_gt_60pct
    primary_sources:
      - "World Bank NY.GDP.TOTL.RT.ZS"

  youth_unemployment:
    description: "Unemployment rate among 15-24 year olds (% of youth labor force)"
    unit: percent_youth_labor_force
    valid_features:
      - low_lt_10pct
      - moderate_10_20pct
      - elevated_20_30pct
      - high_30_40pct
      - very_high_gt_40pct
    primary_sources:
      - "World Bank SL.UEM.1524.ZS"
      - "ILO ILOSTAT"

  gini:
    description: "Gini coefficient measuring income inequality (0 = perfect equality, 100 = perfect inequality)"
    unit: gini_0_to_100
    valid_features:
      - low_lt_30
      - moderate_30_40
      - elevated_40_50
      - high_gt_50
    primary_sources:
      - "World Bank SI.POV.GINI"
      - "SWIID"
      - "UNDP HDR"

  neet_rate:
    description: "Youth not in education, employment, or training as % of youth population (lower = better)"
    unit: percent_youth_population
    valid_features:
      - low_lt_15pct
      - moderate_15_25pct
      - elevated_25_35pct
      - high_35_50pct
      - very_high_gt_50pct
    primary_sources:
      - "ILO ILOSTAT (EAP_YNEET_SEX_RT)"
      - "World Bank SL.UEM.NEET.ZS"

  gini_adjusted_gdp_per_capita:
    description: "GDP per capita adjusted for inequality: GDP_pc × (1 − Gini/100); combines income level and distribution"
    unit: usd_inequality_adjusted
    quantitative_transform: "stored as pre-computed value"
    valid_features:
      - above_peak
      - near_peak_90_100pct
      - moderate_decline_70_90pct
      - significant_decline_50_70pct
      - severe_decline_30_50pct
      - collapse_below_30pct
    primary_sources:
      - "Derived: World Bank NY.GDP.PCAP.CD × (1 − SI.POV.GINI/100)"

  fiscal_health:
    description: "Government debt sustainability, budget balance"
    unit: debt_percent_gdp
    valid_features:
      - surplus_low_debt_lt_30pct
      - small_deficit_manageable_30_60pct
      - moderate_deficit_elevated_60_90pct
      - large_deficit_high_90_120pct
      - unsustainable_debt_crisis
      - fiscal_collapse
    primary_sources:
      - "IMF"
      - "World Bank"
      - "Ministry of Finance reports"
    components:
      gross_debt_pct_gdp:
        description: "General government gross debt as % of GDP (stock measure)"
        unit: percent_gdp
        source_code: "IMF WEO: GGXWDG_NGDP"
        fallback: "IMF Article IV consultation documents"
      budget_balance_pct_gdp:
        description: "General government net lending/borrowing as % of GDP (flow measure; surplus positive, deficit negative)"
        unit: percent_gdp
        source_code: "IMF WEO: GGXCNL_NGDP"
        fallback: "IMF Article IV consultation documents"

international:
  sanctions:
    description: "Degree of international economic restrictions"
    unit: qualitative_scale
    valid_features:
      - no_sanctions
      - targeted_individuals_only
      - sectoral_sanctions
      - broad_economic_humanitarian_exceptions
      - comprehensive_sanctions
      - total_isolation
    primary_sources:
      - "US Treasury OFAC"
      - "EU sanctions lists"
      - "UN Security Council resolutions"

  diplomatic_integration:
    description: "Recognition, embassy presence, membership in international bodies"
    unit: qualitative_scale
    valid_features:
      - full_relations_active_international
      - normal_minor_disputes
      - partial_isolation_some_closures
      - significant_isolation
      - pariah_status
      - no_international_recognition
    primary_sources:
      - "News analysis"
      - "Foreign ministry announcements"

  foreign_military:
    description: "External military involvement (sovereignty indicator)"
    unit: qualitative_scale
    valid_features:
      - no_foreign_presence_full_sovereignty
      - limited_invited_advisors
      - significant_invited_forces
      - contested_mixed_presence
      - occupied_major_uninvited
      - active_foreign_combat_operations
    primary_sources:
      - "News analysis"
      - "IISS Military Balance"

  fdi:
    description: "Foreign Direct Investment inflows as indicator of international business confidence"
    unit: percent_gdp
    valid_features:
      - high_gt_5pct_gdp
      - moderate_2_5pct_gdp
      - low_1_2pct_gdp
      - very_low_05_1pct_gdp
      - minimal_lt_05pct_gdp
      - negative_net_outflows
    primary_sources:
      - "UNCTAD"
      - "World Bank"
    components:
      fdi_net_inflows:
        description: "FDI net inflows in absolute terms (can be negative)"
        unit: usd_millions_current
        source_code: "World Bank BX.KLT.DINV.CD.WD"
        fallback: "UNCTAD FDI statistics (inward flows table)"
      gdp:
        description: "GDP at current market prices, current USD (denominator)"
        unit: usd_current
        source_code: "World Bank NY.GDP.MKTP.CD"
        fallback: "IMF WEO series NGDPD"

  refugee_flows:
    description: "Population displacement as indicator of crisis severity"
    unit: percent_population_per_year
    valid_features:
      - net_returns_minimal_displacement
      - stable_minimal_new
      - moderate_outflows_lt_1pct
      - significant_outflows_1_3pct
      - mass_displacement_3_10pct
      - catastrophic_gt_10pct
    primary_sources:
      - "UNHCR"
    components:
      refugees:
        description: "Refugees by country of origin (persons outside their country of origin, end-of-year stock)"
        unit: persons
        source_code: "UNHCR Refugee Statistics portal (country of origin filter)"
        fallback: "UNHCR Global Trends annual report"
      idps:
        description: "Internally displaced persons (conflict-driven, end-of-year stock)"
        unit: persons
        source_code: "IDMC Global Internal Displacement Database"
        fallback: "UNHCR IDP figures"
      population:
        description: "Total country population (denominator)"
        unit: persons
        source_code: "World Bank SP.POP.TOTL"
        fallback: "UN World Population Prospects"

transparency:
  budget_transparency:
    description: "Can citizens see how public money is raised and spent?"
    unit: open_budget_index_0_100
    valid_features:
      - extensive_gt_80
      - substantial_60_80
      - limited_40_60
      - minimal_20_40
      - scant_lt_20
      - no_information
    primary_sources:
      - "Open Budget Index (International Budget Partnership)"

  press_freedom:
    description: "Can journalists investigate government and publish findings?"
    unit: rsf_inverted_0_100
    quantitative_transform: "100 - value"
    valid_features:
      - free_environment
      - satisfactory
      - problematic
      - difficult
      - very_serious
      - no_press_freedom
    primary_sources:
      - "Reporters Without Borders Press Freedom Index"
      - "Freedom House (historical)"

  statistical_transparency:
    description: "Does the government produce credible, timely socioeconomic data?"
    unit: wb_statistical_capacity_0_100
    valid_features:
      - excellent_gt_80
      - good_60_80
      - moderate_40_60
      - poor_20_40
      - very_poor_lt_20
      - no_statistical_system
    primary_sources:
      - "World Bank Statistical Capacity Indicator"

  legal_transparency:
    description: "Are laws, regulations, and court decisions accessible and predictable?"
    unit: wjp_open_govt_0_100
    quantitative_transform: "value * 100"
    valid_features:
      - laws_published_searchable_foi
      - most_accessible_some_gaps
      - partial_significant_gaps
      - difficult_arbitrary_enforcement
      - minimal_rule_by_decree
      - no_accessible_framework
    primary_sources:
      - "World Justice Project Rule of Law Index"
      - "World Bank Doing Business (historical)"

  extractive_transparency:
    description: "For oil/gas states, are revenues from natural resources disclosed?"
    unit: eiti_compliance_scale
    valid_features:
      - eiti_compliant_satisfactory
      - eiti_compliant_meaningful
      - eiti_compliant_corrective_actions
      - eiti_candidate_or_suspended
      - no_membership_minimal_disclosure
      - no_disclosure_opaque
    not_applicable_countries:
      - tunisia
      - egypt
      - senegal
      - ghana
      - kenya
      - malawi
      - croatia
      - slovakia
      - nepal
      - east_timor
      - mexico
      - peru
      - armenia
    primary_sources:
      - "EITI"

  control_of_corruption:
    description: "Perceptions of the extent to which public power is exercised for private gain (WGI CC.EST; higher = less corrupt = better)"
    unit: wgi_estimate_minus3_to_plus3
    valid_features:
      - minimal_corruption
      - low_corruption
      - moderate_corruption
      - elevated_corruption
      - high_corruption
      - pervasive_corruption
    primary_sources:
      - "World Bank Worldwide Governance Indicators (CC.EST)"

population_mobility:
  net_migration:
    description: "Net migration rate per 1,000 population per year (positive = inflow, negative = outflow)"
    unit: per_1000_per_year
    valid_features:
      - strong_net_inflow
      - strong_net_inflow_(>+5)
      - mild_net_inflow
      - mild_net_inflow_(+1_to_+5)
      - roughly_stable
      - roughly_stable_(-1_to_+1)
      - mild_net_outflow
      - mild_net_outflow_(-5_to_-1)
      - significant_net_outflow
      - significant_net_outflow_(-15_to_-5)
      - severe_net_outflow
      - severe_net_outflow_(<-15)
      - return_migration
    primary_sources:
      - "World Bank SM.POP.NETM"
      - "UN DESA International Migration"

  remittances:
    description: "Personal remittances received as % of GDP (supplementary economic resilience indicator)"
    unit: percent_gdp
    valid_features:
      - minimal_lt_1pct
      - low_1_2pct
      - moderate_2_5pct
      - high_5_10pct
      - very_high_gt_10pct
    primary_sources:
      - "World Bank BX.TRF.PWKR.DT.GD.ZS"

social:
  life_expectancy:
    description: "Life expectancy at birth in years (higher = better)"
    unit: years
    valid_features:
      - very_low_lt_60
      - low_60_65
      - moderate_65_70
      - good_70_75
      - high_gt_75
    primary_sources:
      - "World Bank SP.DYN.LE00.IN"
      - "UN World Population Prospects"

  infant_mortality:
    description: "Infant mortality rate per 1,000 live births (lower = better)"
    unit: per_1000_live_births
    valid_features:
      - very_high_gt_80
      - high_50_80
      - elevated_25_50
      - moderate_10_25
      - low_lt_10
    primary_sources:
      - "World Bank SP.DYN.IMRT.IN"
      - "UNICEF"

  internet_users:
    description: "Individuals using the Internet as % of population (higher = better)"
    unit: percent_population
    valid_features:
      - minimal_lt_5pct
      - very_low_5_20pct
      - low_20_40pct
      - moderate_40_60pct
      - high_60_80pct
      - very_high_gt_80pct
    primary_sources:
      - "World Bank IT.NET.USER.ZS"
      - "ITU"

  health_expenditure:
    description: "Current health expenditure as % of GDP (higher = better)"
    unit: percent_gdp
    valid_features:
      - very_low_lt_3pct
      - low_3_5pct
      - moderate_5_8pct
      - high_gt_8pct
    primary_sources:
      - "World Bank SH.XPD.CHEX.GD.ZS"
      - "WHO Global Health Observatory"

  education_expenditure:
    description: "Government expenditure on education as % of GDP (higher = better)"
    unit: percent_gdp
    valid_features:
      - very_low_lt_2pct
      - low_2_4pct
      - moderate_4_6pct
      - high_gt_6pct
    primary_sources:
      - "World Bank SE.XPD.TOTL.GD.ZS"
      - "UNESCO"
