# Aggregation configuration: how sub-indicator scores combine into dimension and composite scores
# All weights start at 1.0 (equal weight). Adjust as needed.

# Dimension-level aggregation (sub-indicators -> dimension score)
dimensions:
  political:
    sub_indicators:
      - territorial_control
      - political_violence
      - institutional_functioning
      - civil_liberties
      - elite_cohesion
      - military_expenditure
      - political_stability
      - government_effectiveness
    function: weighted_average    # weighted_average | geometric_mean | minimum | harmonic_mean
    weights:
      territorial_control: 1.0
      political_violence: 1.0
      institutional_functioning: 1.0
      civil_liberties: 1.0
      elite_cohesion: 1.0
      military_expenditure: 1.0
      political_stability: 1.0
      government_effectiveness: 1.0
    missing_data_handling: skip_and_renormalize
    # Options:
    #   skip_and_renormalize  - average only available indicators, adjust weights
    #   use_zero              - treat missing as 0
    #   use_floor             - treat missing as specified floor value
    #   use_value: 5          - treat missing as this specific value
    #   exclude_year          - don't produce a score for this country-year

  economic:
    sub_indicators:
      - gdp_per_capita
      - inflation
      - unemployment
      - trade_openness
      - fiscal_health
      - natural_resource_rents
      - youth_unemployment
      - gini
      - neet_rate
      - gini_adjusted_gdp_per_capita
      - poverty_rate
      - gini_adjusted_gdp_per_capita_ppp
      - export_diversification
      - non_resource_export_share
    function: weighted_average
    weights:
      gdp_per_capita: 1.0
      inflation: 1.0
      unemployment: 1.0
      trade_openness: 1.0
      fiscal_health: 1.0
      natural_resource_rents: 1.0
      youth_unemployment: 1.0
      gini: 1.0
      neet_rate: 1.0
      gini_adjusted_gdp_per_capita: 1.0
      poverty_rate: 1.0
      gini_adjusted_gdp_per_capita_ppp: 1.0
      export_diversification: 1.0
      non_resource_export_share: 1.0
    missing_data_handling: skip_and_renormalize

  international:
    sub_indicators:
      - sanctions
      - diplomatic_integration
      - foreign_military
      - fdi
      - refugee_flows
    function: weighted_average
    weights:
      sanctions: 1.0
      diplomatic_integration: 1.0
      foreign_military: 1.0
      fdi: 1.0
      refugee_flows: 1.0
    missing_data_handling: skip_and_renormalize

  transparency:
    sub_indicators:
      - budget_transparency
      - press_freedom
      - statistical_transparency
      - legal_transparency
      - extractive_transparency
      - control_of_corruption
    function: weighted_average
    weights:
      budget_transparency: 1.0
      press_freedom: 1.0
      statistical_transparency: 1.0
      legal_transparency: 1.0
      extractive_transparency: 1.0
      control_of_corruption: 1.0
    missing_data_handling: skip_and_renormalize
    not_applicable_indicators:
      # Some countries don't have extractive industries
      extractive_transparency:
        countries:
          - tunisia
          - egypt
          - senegal
          - ghana
          - kenya
          - malawi
          - croatia
          - slovakia
          - nepal
          - east_timor
          - mexico
          - peru
          - armenia
        handling: exclude  # exclude from average for these countries

  population_mobility:
    sub_indicators: [net_migration, remittances]
    function: weighted_average
    weights: {net_migration: 1.0, remittances: 1.0}
    missing_data_handling: skip_and_renormalize

  social:
    sub_indicators: [life_expectancy, infant_mortality, internet_users, health_expenditure, education_expenditure, hdi]
    function: weighted_average
    weights: {life_expectancy: 1.0, infant_mortality: 1.0, internet_users: 1.0, health_expenditure: 1.0, education_expenditure: 1.0, hdi: 1.0}
    missing_data_handling: skip_and_renormalize

# Composite score (dimensions -> single number)
composite:
  function: weighted_average
  weights:
    political: 1.0
    economic: 1.0
    international: 1.0
    transparency: 1.0
    population_mobility: 1.0
    social: 1.0
  missing_data_handling: skip_and_renormalize
