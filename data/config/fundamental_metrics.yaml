meta:
  total_series: 152
  last_updated: 2026-03-03
  countries_in_scope: 40
  description: >
    Master catalog of fundamental atomic series used as inputs for derived indicators.
    Each series maps to one or more canonical CSV files in data/canonical/<source>/.
    Priority: 1=essential (used in scoring), 2=important (enriches context), 3=supplementary.

