# Scoring rubrics: maps raw data (quantitative thresholds + qualitative features) to 0-100 scores
# For each indicator: quantitative_scoring, qualitative_scoring, combination_rule

political:
  territorial_control:
    quantitative_scoring:
      type: threshold
      input_transform: null
      thresholds:
        - score_range: [90, 100]
          condition: ">= 95"
        - score_range: [70, 89]
          condition: ">= 90"
        - score_range: [50, 69]
          condition: ">= 70"
        - score_range: [30, 49]
          condition: ">= 50"
        - score_range: [10, 29]
          condition: ">= 20"
        - score_range: [0, 9]
          condition: "< 20"
    qualitative_scoring:
      features:
        full_control_no_challenges:
          score_range: [90, 100]
          default_score: 95
        minor_insurgencies_lt_10pct:
          score_range: [70, 89]
          default_score: 80
        significant_areas_outside_10_30pct:
          score_range: [50, 69]
          default_score: 60
        large_portions_contested_30_50pct:
          score_range: [30, 49]
          default_score: 40
        majority_outside_control:
          score_range: [10, 29]
          default_score: 20
        failed_state_no_authority:
          score_range: [0, 9]
          default_score: 5
        foreign_occupation:
          modifier: -10
        multiple_competing_authorities:
          modifier: -15
      multi_feature_rule: minimum
    combination_rule: quantitative_preferred

  political_violence:
    quantitative_scoring:
      type: threshold
      input_transform: null
      thresholds:
        - score_range: [90, 100]
          condition: "< 100"
        - score_range: [70, 89]
          condition: "< 500"
        - score_range: [50, 69]
          condition: "< 2000"
        - score_range: [30, 49]
          condition: "< 10000"
        - score_range: [10, 29]
          condition: "< 50000"
        - score_range: [0, 9]
          condition: ">= 50000"
    qualitative_scoring:
      features:
        minimal_lt_100:
          score_range: [90, 100]
          default_score: 95
        low_100_500:
          score_range: [70, 89]
          default_score: 80
        moderate_500_2000:
          score_range: [50, 69]
          default_score: 60
        high_2000_10000:
          score_range: [30, 49]
          default_score: 40
        severe_10000_50000:
          score_range: [10, 29]
          default_score: 20
        catastrophic_gt_50000:
          score_range: [0, 9]
          default_score: 5
      multi_feature_rule: minimum
    combination_rule: quantitative_preferred

  institutional_functioning:
    quantitative_scoring:
      type: threshold
      input_transform: null
      # V-Dem liberal democracy index (0-1, multiply by 100)
      thresholds:
        - score_range: [90, 100]
          condition: ">= 80"
        - score_range: [70, 89]
          condition: ">= 60"
        - score_range: [50, 69]
          condition: ">= 40"
        - score_range: [30, 49]
          condition: ">= 20"
        - score_range: [10, 29]
          condition: ">= 5"
        - score_range: [0, 9]
          condition: "< 5"
    qualitative_scoring:
      features:
        fully_functional_democratic:
          score_range: [90, 100]
          default_score: 95
        functional_but_flawed:
          score_range: [70, 89]
          default_score: 80
        partially_functional:
          score_range: [50, 69]
          default_score: 55
        severely_degraded:
          score_range: [30, 49]
          default_score: 40
        collapsed_or_nominal:
          score_range: [10, 29]
          default_score: 20
        no_functioning_institutions:
          score_range: [0, 9]
          default_score: 5
      multi_feature_rule: minimum
    combination_rule: quantitative_preferred

  civil_liberties:
    quantitative_scoring:
      type: threshold
      input_transform: "freedom_house_invert"
      # Freedom House CL score 1-7 inverted: (8 - score) / 7 * 100
      thresholds:
        - score_range: [90, 100]
          condition: ">= 85"
        - score_range: [70, 89]
          condition: ">= 70"
        - score_range: [50, 69]
          condition: ">= 50"
        - score_range: [30, 49]
          condition: ">= 30"
        - score_range: [10, 29]
          condition: ">= 15"
        - score_range: [0, 9]
          condition: "< 15"
    qualitative_scoring:
      features:
        full_freedoms:
          score_range: [90, 100]
          default_score: 95
        mostly_free_minor_restrictions:
          score_range: [70, 89]
          default_score: 80
        partially_free:
          score_range: [50, 69]
          default_score: 57
        significant_restrictions:
          score_range: [30, 49]
          default_score: 43
        severe_restrictions:
          score_range: [10, 29]
          default_score: 20
        no_civil_liberties:
          score_range: [0, 9]
          default_score: 5
      multi_feature_rule: minimum
    combination_rule: quantitative_preferred

  elite_cohesion:
    quantitative_scoring:
      type: none
      # No standard quantitative measure; purely qualitative
    qualitative_scoring:
      features:
        stable_unified_governance:
          score_range: [90, 100]
          default_score: 95
        minor_tensions_functional:
          score_range: [70, 89]
          default_score: 80
        significant_competition_managed:
          score_range: [50, 69]
          default_score: 60
        open_factional_conflict:
          score_range: [30, 49]
          default_score: 40
        active_power_struggles:
          score_range: [10, 29]
          default_score: 20
        complete_fragmentation:
          score_range: [0, 9]
          default_score: 5
      multi_feature_rule: minimum
    combination_rule: qualitative_only

economic:
  gdp_per_capita:
    quantitative_scoring:
      type: threshold
      input_transform: "percent_of_peak"
      # Score = (current / peak in series) * 100
      thresholds:
        - score_range: [90, 100]
          condition: ">= 95"
        - score_range: [70, 89]
          condition: ">= 80"
        - score_range: [50, 69]
          condition: ">= 60"
        - score_range: [30, 49]
          condition: ">= 40"
        - score_range: [10, 29]
          condition: ">= 20"
        - score_range: [0, 9]
          condition: "< 20"
    qualitative_scoring:
      features:
        above_peak:
          score_range: [90, 100]
          default_score: 95
        near_peak_90_100pct:
          score_range: [70, 89]
          default_score: 85
        moderate_decline_70_90pct:
          score_range: [50, 69]
          default_score: 65
        significant_decline_50_70pct:
          score_range: [30, 49]
          default_score: 45
        severe_decline_30_50pct:
          score_range: [10, 29]
          default_score: 25
        collapse_below_30pct:
          score_range: [0, 9]
          default_score: 5
      multi_feature_rule: minimum
    combination_rule: quantitative_preferred

  inflation:
    quantitative_scoring:
      type: threshold
      input_transform: null
      # Lower inflation = higher score (inverse relationship)
      thresholds:
        - score_range: [90, 100]
          condition: "< 3"
        - score_range: [70, 89]
          condition: "< 10"
        - score_range: [50, 69]
          condition: "< 25"
        - score_range: [30, 49]
          condition: "< 50"
        - score_range: [10, 29]
          condition: "< 100"
        - score_range: [0, 9]
          condition: ">= 100"
    qualitative_scoring:
      features:
        low_lt_3pct:
          score_range: [90, 100]
          default_score: 95
        moderate_3_10pct:
          score_range: [70, 89]
          default_score: 80
        elevated_10_25pct:
          score_range: [50, 69]
          default_score: 60
        high_25_50pct:
          score_range: [30, 49]
          default_score: 40
        very_high_50_100pct:
          score_range: [10, 29]
          default_score: 20
        hyperinflation_gt_100pct:
          score_range: [0, 9]
          default_score: 5
      multi_feature_rule: minimum
    combination_rule: quantitative_preferred

  unemployment:
    quantitative_scoring:
      type: threshold
      input_transform: null
      # Lower unemployment = higher score
      thresholds:
        - score_range: [90, 100]
          condition: "< 5"
        - score_range: [70, 89]
          condition: "< 10"
        - score_range: [50, 69]
          condition: "< 15"
        - score_range: [30, 49]
          condition: "< 25"
        - score_range: [10, 29]
          condition: "< 40"
        - score_range: [0, 9]
          condition: ">= 40"
    qualitative_scoring:
      features:
        low_lt_5pct:
          score_range: [90, 100]
          default_score: 95
        moderate_5_10pct:
          score_range: [70, 89]
          default_score: 80
        elevated_10_15pct:
          score_range: [50, 69]
          default_score: 60
        high_15_25pct:
          score_range: [30, 49]
          default_score: 40
        very_high_25_40pct:
          score_range: [10, 29]
          default_score: 20
        crisis_gt_40pct:
          score_range: [0, 9]
          default_score: 5
      multi_feature_rule: minimum
    combination_rule: quantitative_preferred

  trade_openness:
    quantitative_scoring:
      type: threshold
      input_transform: null
      # (Exports + Imports) / GDP as percentage
      thresholds:
        - score_range: [90, 100]
          condition: ">= 100"
        - score_range: [70, 89]
          condition: ">= 70"
        - score_range: [50, 69]
          condition: ">= 40"
        - score_range: [30, 49]
          condition: ">= 20"
        - score_range: [10, 29]
          condition: ">= 10"
        - score_range: [0, 9]
          condition: "< 10"
    qualitative_scoring:
      features:
        highly_open_gt_100pct:
          score_range: [90, 100]
          default_score: 95
        open_70_100pct:
          score_range: [70, 89]
          default_score: 80
        moderate_40_70pct:
          score_range: [50, 69]
          default_score: 60
        restricted_20_40pct:
          score_range: [30, 49]
          default_score: 40
        closed_lt_20pct:
          score_range: [10, 29]
          default_score: 20
        autarky_or_blockade:
          score_range: [0, 9]
          default_score: 5
      multi_feature_rule: minimum
    combination_rule: quantitative_preferred

  fiscal_health:
    quantitative_scoring:
      type: threshold
      input_transform: null
      # Debt-to-GDP ratio — lower is better
      thresholds:
        - score_range: [90, 100]
          condition: "< 30"
        - score_range: [70, 89]
          condition: "< 60"
        - score_range: [50, 69]
          condition: "< 90"
        - score_range: [30, 49]
          condition: "< 120"
        - score_range: [10, 29]
          condition: "< 200"
        - score_range: [0, 9]
          condition: ">= 200"
    qualitative_scoring:
      features:
        surplus_low_debt_lt_30pct:
          score_range: [90, 100]
          default_score: 95
        small_deficit_manageable_30_60pct:
          score_range: [70, 89]
          default_score: 80
        moderate_deficit_elevated_60_90pct:
          score_range: [50, 69]
          default_score: 60
        large_deficit_high_90_120pct:
          score_range: [30, 49]
          default_score: 40
        unsustainable_debt_crisis:
          score_range: [10, 29]
          default_score: 20
        fiscal_collapse:
          score_range: [0, 9]
          default_score: 5
      multi_feature_rule: minimum
    combination_rule: quantitative_preferred

