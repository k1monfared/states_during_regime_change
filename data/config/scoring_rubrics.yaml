  fiscal_health:
    quantitative_scoring:
      type: threshold
      input_transform: null
      # Debt-to-GDP ratio — lower is better
      thresholds:
        - score_range: [90, 100]
          condition: "< 30"
        - score_range: [70, 89]
          condition: "< 60"
        - score_range: [50, 69]
          condition: "< 90"
        - score_range: [30, 49]
