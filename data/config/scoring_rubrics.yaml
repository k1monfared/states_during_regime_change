          condition: "< 10"
        - score_range: [50, 69]
          condition: "< 25"
        - score_range: [30, 49]
          condition: "< 50"
        - score_range: [10, 29]
          condition: "< 100"
        - score_range: [0, 9]
          condition: ">= 100"
    qualitative_scoring:
      features:
        low_lt_3pct:
          score_range: [90, 100]
          default_score: 95
        moderate_3_10pct:
          score_range: [70, 89]
          default_score: 80
        elevated_10_25pct:
          score_range: [50, 69]
          default_score: 60
        high_25_50pct:
          score_range: [30, 49]
          default_score: 40
        very_high_50_100pct:
          score_range: [10, 29]
          default_score: 20
        hyperinflation_gt_100pct:
          score_range: [0, 9]
          default_score: 5
