          condition: "< 10"
        - score_range: [50, 69]
          condition: "< 15"
        - score_range: [30, 49]
          condition: "< 25"
        - score_range: [10, 29]
          condition: "< 40"
        - score_range: [0, 9]
          condition: ">= 40"
    qualitative_scoring:
      features:
        low_lt_5pct:
          score_range: [90, 100]
          default_score: 95
        moderate_5_10pct:
          score_range: [70, 89]
          default_score: 80
        elevated_10_15pct:
          score_range: [50, 69]
          default_score: 60
        high_15_25pct:
          score_range: [30, 49]
          default_score: 40
        very_high_25_40pct:
          score_range: [10, 29]
          default_score: 20
        crisis_gt_40pct:
          score_range: [0, 9]
          default_score: 5
