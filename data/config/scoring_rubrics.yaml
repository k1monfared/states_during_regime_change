# Scoring rubrics: maps raw data (quantitative thresholds + qualitative features) to 0-100 scores
# For each indicator: quantitative_scoring, qualitative_scoring, combination_rule

political:
  territorial_control:
    quantitative_scoring:
      type: threshold
      input_transform: null
      thresholds:
        - score_range: [90, 100]
          condition: ">= 95"
        - score_range: [70, 89]
          condition: ">= 90"
        - score_range: [50, 69]
          condition: ">= 70"
        - score_range: [30, 49]
          condition: ">= 50"
        - score_range: [10, 29]
          condition: ">= 20"
        - score_range: [0, 9]
          condition: "< 20"
    qualitative_scoring:
      features:
        full_control_no_challenges:
          score_range: [90, 100]
          default_score: 95
        minor_insurgencies_lt_10pct:
          score_range: [70, 89]
          default_score: 80
        significant_areas_outside_10_30pct:
          score_range: [50, 69]
          default_score: 60
        large_portions_contested_30_50pct:
          score_range: [30, 49]
          default_score: 40
        majority_outside_control:
          score_range: [10, 29]
          default_score: 20
        failed_state_no_authority:
          score_range: [0, 9]
          default_score: 5
        foreign_occupation:
          modifier: -10
        multiple_competing_authorities:
          modifier: -15
      multi_feature_rule: minimum
    combination_rule: quantitative_preferred

  political_violence:
    quantitative_scoring:
      type: threshold
      input_transform: null
      thresholds:
        - score_range: [90, 100]
          condition: "< 100"
        - score_range: [70, 89]
          condition: "< 500"
        - score_range: [50, 69]
          condition: "< 2000"
        - score_range: [30, 49]
          condition: "< 10000"
        - score_range: [10, 29]
          condition: "< 50000"
        - score_range: [0, 9]
          condition: ">= 50000"
    qualitative_scoring:
      features:
        minimal_lt_100:
          score_range: [90, 100]
          default_score: 95
        low_100_500:
          score_range: [70, 89]
          default_score: 80
        moderate_500_2000:
          score_range: [50, 69]
          default_score: 60
        high_2000_10000:
          score_range: [30, 49]
          default_score: 40
        severe_10000_50000:
          score_range: [10, 29]
          default_score: 20
        catastrophic_gt_50000:
          score_range: [0, 9]
          default_score: 5
      multi_feature_rule: minimum
    combination_rule: quantitative_preferred

  institutional_functioning:
    quantitative_scoring:
      type: threshold
      input_transform: null
      # V-Dem liberal democracy index (0-1, multiply by 100)
      thresholds:
        - score_range: [90, 100]
          condition: ">= 80"
        - score_range: [70, 89]
          condition: ">= 60"
        - score_range: [50, 69]
          condition: ">= 40"
        - score_range: [30, 49]
          condition: ">= 20"
        - score_range: [10, 29]
          condition: ">= 5"
        - score_range: [0, 9]
          condition: "< 5"
    qualitative_scoring:
      features:
        fully_functional_democratic:
          score_range: [90, 100]
          default_score: 95
        functional_but_flawed:
          score_range: [70, 89]
          default_score: 80
        partially_functional:
          score_range: [50, 69]
          default_score: 55
        severely_degraded:
          score_range: [30, 49]
          default_score: 40
        collapsed_or_nominal:
          score_range: [10, 29]
          default_score: 20
        no_functioning_institutions:
          score_range: [0, 9]
          default_score: 5
      multi_feature_rule: minimum
    combination_rule: quantitative_preferred

  civil_liberties:
    quantitative_scoring:
      type: threshold
      input_transform: "freedom_house_invert"
      # Freedom House CL score 1-7 inverted: (8 - score) / 7 * 100
      thresholds:
        - score_range: [90, 100]
          condition: ">= 85"
        - score_range: [70, 89]
          condition: ">= 70"
        - score_range: [50, 69]
          condition: ">= 50"
        - score_range: [30, 49]
          condition: ">= 30"
        - score_range: [10, 29]
          condition: ">= 15"
        - score_range: [0, 9]
          condition: "< 15"
    qualitative_scoring:
      features:
        full_freedoms:
          score_range: [90, 100]
          default_score: 95
        mostly_free_minor_restrictions:
          score_range: [70, 89]
          default_score: 80
        partially_free:
          score_range: [50, 69]
          default_score: 57
        significant_restrictions:
          score_range: [30, 49]
          default_score: 43
        severe_restrictions:
          score_range: [10, 29]
          default_score: 20
        no_civil_liberties:
          score_range: [0, 9]
          default_score: 5
      multi_feature_rule: minimum
    combination_rule: quantitative_preferred

  elite_cohesion:
    quantitative_scoring:
      type: none
      # No standard quantitative measure; purely qualitative
    qualitative_scoring:
      features:
        stable_unified_governance:
          score_range: [90, 100]
          default_score: 95
        minor_tensions_functional:
          score_range: [70, 89]
          default_score: 80
        significant_competition_managed:
          score_range: [50, 69]
          default_score: 60
        open_factional_conflict:
          score_range: [30, 49]
          default_score: 40
        active_power_struggles:
          score_range: [10, 29]
          default_score: 20
        complete_fragmentation:
          score_range: [0, 9]
          default_score: 5
      multi_feature_rule: minimum
    combination_rule: qualitative_only

  military_expenditure:
    quantitative_scoring:
      type: threshold
      input_transform: null
      # % GDP; higher spend = lower score (inverted)
      thresholds:
        - score_range: [90, 100]
          condition: "< 1"
        - score_range: [70, 89]
          condition: "< 2"
        - score_range: [50, 69]
          condition: "< 4"
        - score_range: [30, 49]
          condition: "< 7"
        - score_range: [10, 29]
          condition: "< 15"
        - score_range: [0, 9]
          condition: ">= 15"
    qualitative_scoring:
      features:
        minimal_military_spending_lt_1pct:
          score_range: [90, 100]
          default_score: 95
        low_1_2pct:
          score_range: [70, 89]
          default_score: 80
        low_(1-2%):
          score_range: [70, 89]
          default_score: 80
        moderate_2_4pct:
          score_range: [50, 69]
          default_score: 60
        moderate_(2-4%):
          score_range: [50, 69]
          default_score: 60
        elevated_4_7pct:
          score_range: [30, 49]
          default_score: 40
        elevated_(4-7%):
          score_range: [30, 49]
          default_score: 40
        high_7_15pct:
          score_range: [10, 29]
          default_score: 20
        high_(7-15%):
          score_range: [10, 29]
          default_score: 20
        war_economy_gt_15pct:
          score_range: [0, 9]
          default_score: 5
      multi_feature_rule: minimum
    combination_rule: quantitative_preferred

  political_stability:
    quantitative_scoring:
      type: threshold
      input_transform: null
      # WGI PV.EST: higher = more stable
      thresholds:
        - score_range: [90, 100]
          condition: ">= 1.5"
        - score_range: [75, 89]
          condition: ">= 0.5"
        - score_range: [55, 74]
          condition: ">= -0.5"
        - score_range: [35, 54]
          condition: ">= -1.5"
        - score_range: [15, 34]
          condition: ">= -2.0"
        - score_range: [0, 14]
          condition: "< -2.0"
    qualitative_scoring:
      features:
        very_stable:
          score_range: [90, 100]
          default_score: 95
        stable:
          score_range: [75, 89]
          default_score: 82
        mild_instability:
          score_range: [55, 74]
          default_score: 65
        significant_instability:
          score_range: [35, 54]
          default_score: 45
        high_instability:
          score_range: [15, 34]
          default_score: 25
        extreme_instability_conflict:
          score_range: [0, 14]
          default_score: 7
      multi_feature_rule: minimum
    combination_rule: qualitative_preferred

  government_effectiveness:
    quantitative_scoring:
      type: threshold
      input_transform: null
      # WGI GE.EST: higher = better
      thresholds:
        - score_range: [85, 100]
          condition: ">= 1.5"
        - score_range: [70, 84]
          condition: ">= 0.5"
        - score_range: [50, 69]
          condition: ">= -0.5"
        - score_range: [25, 49]
          condition: ">= -1.5"
        - score_range: [0, 24]
          condition: "< -1.5"
    qualitative_scoring:
      features:
        very_effective:
          score_range: [85, 100]
          default_score: 92
        effective:
          score_range: [70, 84]
          default_score: 77
        partially_effective:
          score_range: [50, 69]
          default_score: 60
        low_effectiveness:
          score_range: [25, 49]
          default_score: 37
        ineffective_or_captured:
          score_range: [0, 24]
          default_score: 12
      multi_feature_rule: minimum
    combination_rule: qualitative_preferred

economic:
  gdp_per_capita:
    quantitative_scoring:
      type: threshold
      input_transform: "percent_of_peak"
      # Score = (current / peak in series) * 100
      thresholds:
        - score_range: [90, 100]
          condition: ">= 95"
        - score_range: [70, 89]
          condition: ">= 80"
        - score_range: [50, 69]
          condition: ">= 60"
        - score_range: [30, 49]
          condition: ">= 40"
        - score_range: [10, 29]
          condition: ">= 20"
        - score_range: [0, 9]
          condition: "< 20"
    qualitative_scoring:
      features:
        above_peak:
          score_range: [90, 100]
          default_score: 95
        near_peak_90_100pct:
          score_range: [70, 89]
          default_score: 85
        moderate_decline_70_90pct:
          score_range: [50, 69]
          default_score: 65
        significant_decline_50_70pct:
          score_range: [30, 49]
          default_score: 45
        severe_decline_30_50pct:
          score_range: [10, 29]
          default_score: 25
        collapse_below_30pct:
          score_range: [0, 9]
          default_score: 5
      multi_feature_rule: minimum
    combination_rule: quantitative_preferred

  inflation:
    quantitative_scoring:
      type: threshold
      input_transform: null
      # Lower inflation = higher score (inverse relationship)
      thresholds:
        - score_range: [90, 100]
          condition: "< 3"
