          default_score: 20
        fiscal_collapse:
          score_range: [0, 9]
          default_score: 5
      multi_feature_rule: minimum
    combination_rule: quantitative_preferred

  natural_resource_rents:
    quantitative_scoring:
      type: threshold
      input_transform: null
      # % GDP; higher rents = lower score (resource-curse framing)
      thresholds:
        - score_range: [70, 84]
          condition: "< 5"
        - score_range: [50, 64]
          condition: "< 15"
        - score_range: [30, 49]
          condition: "< 30"
        - score_range: [15, 29]
