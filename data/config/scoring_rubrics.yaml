  trade_openness:
    quantitative_scoring:
      type: threshold
      input_transform: null
      # (Exports + Imports) / GDP as percentage
      thresholds:
        - score_range: [90, 100]
          condition: ">= 100"
        - score_range: [70, 89]
          condition: ">= 70"
        - score_range: [50, 69]
          condition: ">= 40"
        - score_range: [30, 49]
          condition: ">= 20"
        - score_range: [10, 29]
          condition: ">= 10"
        - score_range: [0, 9]
          condition: "< 10"
    qualitative_scoring:
      features:
        highly_open_gt_100pct:
