transparency:
  budget_transparency:
    quantitative_scoring:
      type: direct
      # Open Budget Index already 0-100, use directly
      input_transform: null
      thresholds:
        - score_range: [80, 100]
          condition: ">= 80"
        - score_range: [60, 79]
          condition: ">= 60"
        - score_range: [40, 59]
          condition: ">= 40"
        - score_range: [20, 39]
          condition: ">= 20"
        - score_range: [1, 19]
          condition: ">= 1"
        - score_range: [0, 0]
          condition: "< 1"
    qualitative_scoring:
