    qualitative:
      assessment: 'Tunisia under Ben Ali had no press freedom in 2009. The internet was

        heavily censored (Tunisia was ranked among the world''s most repressive

        online censors). Journalists were imprisoned, newspapers were confiscated,

        and foreign media was regulated. RSF ranked Tunisia among the worst

        press freedom environments globally, typically between ranks 140-155

        out of 175 countries.

        '
      features:
      - very_serious
      sources:
      - citation: RSF World Press Freedom Index 2009, Tunisia
        url: https://rsf.org/en/index
        access_date: '2026-03-01'
        type: ngo_report
        reliability: medium
      confidence: high
      notes: Pre-2022 RSF legacy methodology; Tunisia consistently in bottom tier; internet censorship severe
