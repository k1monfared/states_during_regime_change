indicator: refugee_flows
country: algeria
dimension: international
years:
  2004:
    data_status: complete
    quantitative:
      value: 0.005
      unit: percent_population_per_year
      source:
        citation: "UNHCR Global Trends 2004; UNHCR Algeria country data"
        url: "https://www.unhcr.org/global-trends"
        access_date: "2025-01-15"
      reliability: medium
    qualitative:
      assessment: |
        Algeria is primarily a HOST country for refugees rather than a source of
        outflows. The dominant feature is Algeria hosting approximately 170,000
        Sahrawi refugees from Western Sahara in Tindouf camps (southwestern Algeria)
        — the largest stateless refugee population in Africa. These camps have been
        managed by UNHCR and Polisario Front since 1975-1976 and remain a permanent
        feature. Algerian citizens themselves produce minimal refugee outflows —
        the civil war of the 1990s created some Algerian diaspora in Europe/Canada
        but by 2004 net outflows are negligible. GSPC insurgency concentrated in
        mountains; no mass population displacement.
      features:
        - stable_minimal_new
      sources:
        - citation: "UNHCR Global Trends 2004"
          url: "https://www.unhcr.org/global-trends"
          type: "government"
          reliability: medium
        - citation: "UNHCR Western Sahara/Sahrawi refugee situation"
          url: "https://www.unhcr.org/western-sahara"
          type: "government"
          reliability: high
      confidence: medium
      notes: "Algeria hosts ~170,000 Sahrawi refugees in Tindouf; negligible Algerian outflows"
