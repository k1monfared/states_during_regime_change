        access_date: "2025-01-15"
      reliability: medium
    qualitative:
      assessment: |
        Algerian government controls all major cities, populated areas, and
        economic centers. Civil war of 1990s effectively ended — national
        reconciliation process ongoing. Residual GSPC (Group Salafiste pour la
        Prédication et le Combat) insurgency active in Kabylie mountains and
        southern Saharan zones. Less than 5% of territory has significant
        insurgent activity. No major population centers contested. Government
        has near-full territorial control.
      features:
        - minor_insurgencies_lt_10pct
      sources:
        - citation: "International Crisis Group, Algeria Report 2004"
          url: "https://www.crisisgroup.org/middle-east-north-africa/north-africa/algeria"
          type: "think_tank_report"
          reliability: high
        - citation: "US State Department Algeria Country Report 2004"
          url: "https://www.state.gov/reports/country-reports-on-terrorism/"
          type: "government"
          reliability: medium
      confidence: high
      notes: "GSPC active but confined to remote mountain and desert areas"
