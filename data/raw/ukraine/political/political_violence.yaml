    qualitative:
      assessment: "Catastrophic political violence in 2014. Three phases:\n1. Euromaidan: ~100 protesters and police killed in February 2014 before Yanukovych fled\n2. Odessa Trade Union Building fire (May 2014): ~48 pro-Russia activists killed\n3. Donbas armed conflict (April 2014+): Full-scale armed conflict between Ukrainian forces\n   and Russian-backed separatists. UCDP records approximately 3,000-5,000 conflict deaths\n   in 2014 alone. OHCHR total estimates ~5,000-7,000 dead by year-end including civilians.\nMH17 shot down July 17, 2014 — 298 killed.\n"
      features:
      - high_2000_10000
      sources:
