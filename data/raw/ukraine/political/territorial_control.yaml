      unit: percent_territory_controlled
      source:
        citation: UCDP, OHCHR, and territorial assessment — Crimea ~27,000 km², Donbas controlled ~17,000 km² by Russia/proxies
        url: https://www.ohchr.org/en/countries/ukraine
        access_date: '2026-03-01'
      reliability: high
    qualitative:
      assessment: 'Catastrophic territorial losses in 2014. Russia annexed Crimea (March 2014) — approximately

        27,000 km² (4.5% of Ukraine''s territory). Russian proxy forces seized significant portions

        of Donetsk and Luhansk oblasts (Donbas conflict, April 2014+). By end 2014, Ukraine had

        lost control of approximately 17,000-20,000 km² in Donbas (3-3.5%) plus 27,000 km² Crimea

        — total loss approximately 7-8% of internationally recognized territory, or approximately

        20% of economic zones. Government controlled approximately 80% of territory.

        '
      features:
      - significant_areas_outside_10_30pct
      sources:
      - citation: OHCHR Ukraine monitoring
        url: https://www.ohchr.org/en/countries/ukraine
        type: international_organization
        reliability: high
      confidence: high
      notes: Crimea annexed ~27K km² (4.5%); Donbas ~17-20K km² lost; total ~44-47K km² = ~7-8% of territory
