      reliability: medium
    qualitative:
      assessment: 'The 2014 Crimea annexation and Donbas conflict created the first major displacement

        crisis. By October 2014, approximately 417,000-500,000 IDPs were registered (mostly

        from Donbas with some from Crimea). An additional 1+ million fled to Russia. Ukraine

        rapidly became one of the top-10 IDP countries globally.

        '
      features:
      - catastrophic_gt_10pct
      sources:
      - citation: UNHCR Ukraine 2014
        url: https://www.unhcr.org/where-we-work/countries/ukraine
        type: international_organization
        reliability: medium
      - citation: State Emergency Service of Ukraine, IDP data 2014
        url: https://reliefweb.int/report/ukraine/profiling-and-needs-assessment-internally-displaced-persons-idps-17-october-2014
        type: government
        reliability: medium
      confidence: medium
      notes: ~417K-500K IDPs by end 2014; 1M+ fled to Russia; Donbas and Crimea displacement
