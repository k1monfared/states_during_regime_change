dimension: political
# Freedom House Civil Liberties score (1=most free, 7=least free)
# Inverted value: (8 - raw_score) / 7 * 100
# Indonesia FH CL scores (raw): 1990-1997: 6; 1998: 5; 1999-2000: 4; 2001-2005: 3-4;
# 2006-2013: 4; 2014-2017: 4; 2018-2025: 4-5
years:
  1990:
    data_status: complete
    quantitative:
      value: 6
      unit: freedom_house_inverted
      source:
        citation: "Freedom House, Freedom in the World 1990-1991, Indonesia, Civil Liberties score 6"
        url: "https://freedomhouse.org/country/indonesia/freedom-world/1991"
        access_date: "2026-03-01"
      reliability: high
    qualitative:
      assessment: |
        Freedom House CL score 6 (raw) = inverted ~28.6/100. Suharto New Order: severe restrictions
        on assembly, expression, and press. ABRI intelligence (BAKIN) monitored activists.
        Political parties limited to Golkar, PDI, PPP. Blasphemy law (1965) in force. Labor
        unions controlled by SPSI. Freedom of movement restricted for some groups. Media
        censorship pervasive — all TV state-owned.
      features:
        - severe_restrictions
      sources:
        - citation: "Freedom House, Freedom in the World 1990-91, Indonesia"
          url: "https://freedomhouse.org/country/indonesia/freedom-world/1991"
          type: index_dataset
          reliability: high
      confidence: high
      notes: "FH CL raw=6; inverted=28.6; severe restrictions; ABRI monitoring; press censorship"
