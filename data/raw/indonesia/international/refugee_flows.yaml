indicator: refugee_flows
country: indonesia
dimension: international
# Refugee flows as % of population per year
# Indonesian population: ~180M (1990), ~200M (1998), ~220M (2005), ~270M (2020), ~280M (2025)
# Major displacement events:
# 1998-1999: East Timor post-referendum ~250,000 displaced (~0.1% of total Indonesia)
# 1999-2000: Maluku ~500,000 IDPs (internal); Kalimantan ~200,000 IDPs
# 2004: Tsunami Aceh ~500,000 IDPs
# Papua: ongoing but low numbers
# Indonesia also HOSTS some refugees (Rohingya, Afghans) but small as % of population
years:
  1990:
    data_status: partial
    quantitative:
      value: null
      unit: percent_population_per_year
      source:
        citation: "UNHCR; academic analysis of Indonesia displacement 1990"
        url: "https://www.unhcr.org/indonesia"
        access_date: "2026-03-01"
      reliability: medium
    qualitative:
      assessment: |
        Minimal new displacement. East Timor occupation ongoing — ~100,000-250,000 Timorese
        displaced since 1975 invasion (cumulative, over many years). Aceh DOM operations
        causing local displacement but within Indonesia. West Papua low-level displacement
        along PNG border (some cross-border). As a percentage of Indonesia's 180M population,
        new flows minimal. Indonesia not a refugee-producing country at scale.
      features:
        - stable_minimal_new
      sources:
        - citation: "UNHCR Indonesia country records; academic analysis"
          url: "https://www.unhcr.org/indonesia"
          type: official_report
          reliability: medium
      confidence: medium
      notes: "East Timor cumulative displacement; Aceh DOM local; Papua PNG border; minimal new flows"
