# 2002: ~78; 2003: ~73; 2004: ~72; 2005: ~68; 2006: ~62; 2007: ~56; 2008: ~53; 2009: ~52
# 2010: ~55; 2011: ~57; 2012: ~59; 2013: ~60; 2014: ~57; 2015: ~58; 2016: ~57
# 2017: ~58; 2018: ~56; 2019: ~60; 2020: ~56; 2021: ~57; 2022: ~62; 2023: ~64; 2024: ~64
# Inverted (freedom score): 1990-1997 ~10-20 (not free); 1998 transition; 1999-2001 ~25-35
