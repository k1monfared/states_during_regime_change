indicator: extractive_transparency
country: indonesia
dimension: transparency
# Indonesia is a major oil/gas and mining state — EITI applicable
# Indonesia EITI history:
# 2010: Indonesia applies for EITI candidacy
# 2010: EITI candidate status granted
# 2014: Indonesia becomes EITI Compliant (October 2014)
# 2017: EITI Compliant reaffirmed (Validation 2017)
# 2019: EITI Compliant maintained
# 2021: EITI Compliant maintained
# Pre-2010: No EITI membership — Pertamina (state oil) and coal revenues largely opaque
# Suharto era (1990-1998): total opacity; PSCs (Production Sharing Contracts) secret
# Reformasi (1998-2009): partial disclosure; BP Migas (petroleum regulator) established 2001
# 2010+: EITI candidate; improving disclosure
# 2014+: EITI compliant; full reconciliation reports published
# Key extractives: oil/gas (declining), coal (major exporter), nickel, palm oil
years:
  1990:
    data_status: partial
    quantitative:
      value: null
      unit: eiti_compliance_scale
      source:
        citation: "EITI Indonesia; Global Witness Indonesia extractives; Revenue Watch Index"
        url: "https://eiti.org/indonesia"
        access_date: "2026-03-01"
      reliability: low
    qualitative:
      assessment: |
        Suharto New Order. Pertamina state oil company completely opaque — revenues
        channeled directly to presidential discretionary funds. Production Sharing Contracts
        (PSCs) with IOCs (Exxon, Caltex, Shell, Total) classified secret. No public
        disclosure of oil/gas revenues. Mining contracts similarly opaque under mining law
        (UU 11/1967). Coal boom beginning — contracts not disclosed. No EITI (EITI
        founded 2002). Estimated revenue disclosure: near zero.
      features:
        - no_disclosure_opaque
      sources:
        - citation: "Global Witness Indonesia extractives reporting; Pertamina Annual Report (limited)"
          url: "https://eiti.org/indonesia"
          type: ngo_report
          reliability: medium
        - citation: "V-Dem Indonesia Dataset; Freedom House Indonesia 1990"
          url: "https://v-dem.net"
          type: academic_dataset
          reliability: high
      confidence: high
      notes: "Suharto; Pertamina revenues to presidential funds; PSCs secret; total opacity"
