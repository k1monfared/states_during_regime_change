indicator: budget_transparency
country: indonesia
dimension: transparency
# Open Budget Index (OBI) scores for Indonesia:
# OBS 2006: 51/100; 2008: 54; 2010: 51; 2012: 62; 2015: 59; 2017: 64; 2019: 67; 2021: 67; 2023: 72
# Pre-2006: qualitative estimation based on reformasi trajectory
# Suharto era (1990-1998): very low transparency, scant to minimal
# Habibie/Wahid transition (1998-2001): improving from scant
# Megawati-SBY era (2001-2006): improving gradually
