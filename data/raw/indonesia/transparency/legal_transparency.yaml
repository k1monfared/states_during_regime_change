# WJP Rule of Law Index Factor 3 (Open Government) for Indonesia
# WJP started systematic country coverage in 2011
# WJP scores (0-1 scale, multiplied by 100 for this dataset):
# 2011: ~0.46 | 2012: ~0.46 | 2014: ~0.47 | 2015: ~0.48 | 2016: ~0.48
# 2017: ~0.49 | 2018: ~0.49 | 2019: ~0.49 | 2020: ~0.50 | 2021: ~0.50
# 2022: ~0.50 | 2023: ~0.51 | 2024: ~0.51
# Pre-2011: qualitative assessment based on Freedom House, Doing Business, V-Dem
# Suharto era: minimal rule by decree / difficult arbitrary enforcement
# Reformasi: partial significant gaps; judiciary reform ongoing
# SBY/Jokowi era: improving to most accessible some gaps
