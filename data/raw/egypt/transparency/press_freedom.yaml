      sources:
        - citation: "RSF World Press Freedom Index 2013 (covering 2012)"
          url: "https://rsf.org/en/ranking"
          type: "ngo"
          reliability: high
      confidence: high
      notes: "Bassem Youssef's Al-Bernameg attracted 30M viewers; mockery of Morsi aired freely"
