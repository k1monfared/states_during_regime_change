  1996:
    data_status: complete
    quantitative:
      value: null
      unit: null
      source:
        citation: "World Bank Rule of Law Index; Freedom House Rule of Law; USAID Legal Reform assessments"
        url: "https://info.worldbank.org/governance/wgi/"
        access_date: "2025-01-15"
      reliability: medium
    qualitative:
      assessment: |
        Legal transparency severely constrained under Egypt's Emergency Law (in effect
        continuously since 1981). Emergency courts operated outside normal legal procedures,
        with no public access to their proceedings, no appeals, and no independent oversight.
        The Supreme Constitutional Court (SCC) provided some constitutional review function.
        The Official Gazette (Al-Waqai Al-Masriya) published laws, but regulations and
        procedures of State Security courts were not disclosed. Military courts had
        jurisdiction over civilians on broad national security grounds.
      features:
        - difficult_arbitrary_enforcement
      sources:
        - citation: "World Bank Worldwide Governance Indicators, Rule of Law: Egypt"
          url: "https://info.worldbank.org/governance/wgi/"
          type: "dataset"
          reliability: high
        - citation: "Human Rights Watch World Report 1997: Egypt"
          url: "https://www.hrw.org/world-report/1997"
          type: "ngo"
          reliability: high
      confidence: medium
      notes: "Emergency Law in force since 1981; emergency courts completely opaque"
