    qualitative:
      assessment: 'Partial press freedom recovery in 2013. RSF inverted score approximately 57.

        Operation Serval restored major northern cities, removing jihadist media restrictions.

        Elections in August 2013 reinvigorated political media coverage. However, security

        situation in north and center created dangerous operating environment for journalists.

        Several journalists remained at risk from jihadist groups. Some self-censorship

        on security topics. Modest improvement from 2012 crisis trough.

        '
      features:
      - problematic
      sources:
      - citation: RSF Mali 2013; partial recovery post-Serval; security remains dangerous for journalists
        url: https://rsf.org/en/ranking
        type: ngo_report
        reliability: high
      confidence: high
      notes: Post-Serval partial recovery; elections revived political media; north dangerous; jihadist threats to journalists remaining; partial recovery ~rank 75
