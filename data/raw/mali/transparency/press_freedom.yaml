    qualitative:
      assessment: 'Mali ranked approximately 26th out of 178 in the 2010 RSF Press Freedom Index —

        one of the best rankings in Africa and globally notable for a low-income country.

        RSF inverted score approximately 71. Mali under ATT government had a vibrant

        independent press — over 100 radio stations, multiple private newspapers, and

        active TV channels. Journalists could criticize the government. Press freedom

        was considered a democratic achievement. High freedom in West African context.

        '
      features:
      - satisfactory
      sources:
      - citation: RSF Press Freedom Index Mali 2010; ranked ~26/178
        url: https://rsf.org/en/ranking
        type: ngo_report
        reliability: high
      confidence: high
      notes: RSF ~rank 26/178; inverted score ~71; vibrant multi-party press; 100+ radio stations; ATT government permissive; Africa standout
