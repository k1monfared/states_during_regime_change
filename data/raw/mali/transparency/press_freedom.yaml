    qualitative:
      assessment: 'Press freedom remained problematic in 2014. RSF inverted score approximately 53.

        Civilian government allowed media plurality in Bamako but insecurity in north and

        expanding center limited reporting. Kidal crisis (May 2014) created no-go zones.

        Journalists faced threats from armed groups operating across the country. AQIM and

        MUJAO sporadic threats. Some journalists self-censoring on sensitive topics.

        Still well below pre-coup levels.

        '
      features:
      - difficult
      sources:
      - citation: RSF Mali 2014; insecurity limiting reporting; Kidal no-go zones
        url: https://rsf.org/en/ranking
        type: ngo_report
        reliability: high
      confidence: high
      notes: Kidal no-go for journalists; armed group threats; Bamako media plural; self-censorship on security; ~rank 90
