  2010:
    data_status: complete
    quantitative:
      value: null
      unit: qualitative_scale
      source:
        citation: V-Dem; Freedom House Country Report Mali 2010; qualitative assessment,
          accessed 2026-03-01
        url: https://freedomhouse.org/countries/freedom-world/scores
        access_date: '2026-03-01'
      reliability: medium
    qualitative:
      assessment: 'Institutions functioning but flawed in 2010. Mali was a multi-party
        democracy

        under President Touré (ATT). Legislature (Assemblée Nationale) operational.

        Judiciary nominally independent but weak capacity. Elections held on schedule.

        Civil service functioning. However, northern Mali had traditionally weak state

        presence and chronic governance deficits. Overall considered a relatively

        successful African democracy compared to regional peers.

        '
      features:
      - functional_but_flawed
      sources:
      - citation: Freedom House Mali 2010; V-Dem
        url: https://freedomhouse.org
        type: ngo_report
        reliability: high
      confidence: high
      notes: Multi-party democracy; ATT government; legislature/judiciary functional;
        weak northern governance; regional democracy model
  2011:
    data_status: complete
    quantitative:
      value: null
      unit: qualitative_scale
      source:
        citation: V-Dem; Freedom House Country Report Mali 2011; qualitative assessment,
          accessed 2026-03-01
        url: https://freedomhouse.org/countries/freedom-world/scores
        access_date: '2026-03-01'
      reliability: medium
    qualitative:
      assessment: 'Institutions functional but showing strain in 2011. ATT government
        governing

        without a majority coalition, dependent on patronage networks. MNLA formed

        October 2011. Northern governance weakening. Legislature and judiciary

        nominally functional. Growing corruption allegations undermining ATT''s

        legitimacy. Still considered functioning democracy prior to 2012 collapse.

        '
      features:
      - functional_but_flawed
      sources:
      - citation: Freedom House Mali 2011; V-Dem
        url: https://freedomhouse.org
        type: ngo_report
        reliability: high
      confidence: high
      notes: ATT patronage governance; MNLA formed Oct 2011; corruption growing; northern
        governance weakening pre-crisis
  2012:
    data_status: complete
    quantitative:
      value: null
      unit: qualitative_scale
      source:
        citation: V-Dem; Freedom House Country Report Mali 2012; qualitative assessment,
          accessed 2026-03-01
        url: https://freedomhouse.org/countries/freedom-world/scores
        access_date: '2026-03-01'
      reliability: medium
    qualitative:
      assessment: 'Institutions severely degraded in 2012. Military coup March 22,
        2012 suspended

        the constitution, dissolved the government, and established the CNRDRE military

        junta. Constitutional court and parliament suspended. Elections cancelled.
        The

        junta negotiated a transition framework with ECOWAS that allowed a nominal

        transitional government, but real power remained with coup leaders.

        Worst institutional breakdown in Mali since independence.

        '
      features:
      - severely_degraded
      sources:
      - citation: Freedom House Mali 2012; CNRDRE coup March 2012
        url: https://freedomhouse.org
        type: ngo_report
        reliability: high
      confidence: high
      notes: Coup March 22 suspended constitution; CNRDRE junta; parliament dissolved;
        elections cancelled; ECOWAS transition framework
