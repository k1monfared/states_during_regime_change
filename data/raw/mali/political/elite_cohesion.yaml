    qualitative:
      assessment: 'Minor tensions but functional governance in 2010. ATT was in his second term

        (2007-2012) and had built a broad governing coalition. Major political parties

        (ADEMA, URD, CNID) cooperated in parliament. Military factions contained.

        ATT governed through patronage and consensus-building. No significant elite

        fractures threatening governance. Pre-crisis stability maintained.

        '
      features:
      - minor_tensions_functional
      sources:
      - citation: Qualitative assessment Mali elite dynamics 2010
        url:
        type: academic_report
        reliability: medium
      confidence: medium
      notes: ATT broad coalition; major parties cooperating; patronage consensus; military contained; pre-crisis stability
  2011:
    data_status: complete
    quantitative:
      value:
      unit: qualitative_scale
      source:
