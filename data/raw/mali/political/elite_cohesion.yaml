    qualitative:
      assessment: 'Complete fragmentation in 2020. August 18, 2020 coup by Colonel Assimi Goïta

        and other military officers ousted Keïta. Keïta resigned under military pressure.

        Junta formed National Committee for the Salvation of the People (CNSP). ECOWAS

        mediation produced transitional framework with civilian president Bah Ndaw but

        Goïta retained real power. Deep split between civilian political class and

        military junta. Second-tier military officers competing within junta.

        '
      features:
      - complete_fragmentation
      sources:
      - citation: Qualitative assessment Mali elite dynamics 2020; Goïta coup Aug 2020
        url:
        type: academic_report
        reliability: high
      confidence: high
      notes: Coup Aug 18 2020; Keïta resigned; Goïta CNSP; Bah Ndaw nominal; civilian vs military split; intra-junta competition
