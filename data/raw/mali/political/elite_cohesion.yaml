        url:
        access_date: '2026-03-01'
      reliability: medium
      value_source:
      series_id:
      calculated_value:
      discrepancy:
    qualitative:
      assessment: 'Significant competition beginning to emerge in 2011. ATT''s governing coalition

        showing strain. Military officers frustrated with northern security management

        (MNLA gaining strength). Junior officers increasingly critical of ATT''s

        perceived indifference to northern Mali. Coup conspiracies forming in the

        military. Elite fragmentation visible with electoral politics heating up for

        2012 elections. ATT constitutionally unable to run again.

        '
      features:
      - significant_competition_managed
      sources:
      - citation: Qualitative assessment Mali elite dynamics 2011; coup trajectory analysis
        url:
        type: academic_report
        reliability: medium
      confidence: medium
      notes: ATT coalition fraying; military frustration at north; coup conspiracies forming; 2012 election succession uncertainty
  2012:
    data_status: complete
    quantitative:
      value:
      unit: qualitative_scale
      source:
        citation: 'Qualitative assessment: elite cohesion Mali 2012, accessed 2026-03-01'
        url:
        access_date: '2026-03-01'
      reliability: medium
      value_source:
      series_id:
      calculated_value:
      discrepancy:
    qualitative:
      assessment: 'Complete fragmentation in 2012. March 2012 coup by Captain Amadou Sanogo

        (CNRDRE junta) overthrew ATT. Internal junta divisions immediately emerged —

        Sanogo vs senior military officers vs political class. ECOWAS mediation imposed

        transition framework with civilian Dioncounda Traoré as interim president while

        Sanogo retained real power. Multiple power centers competing. The worst elite

        fragmentation in Mali''s post-independence history.

        '
      features:
      - complete_fragmentation
      sources:
      - citation: Qualitative assessment Mali coup dynamics 2012; Sanogo/CNRDRE analysis
        url:
        type: academic_report
        reliability: medium
      confidence: high
      notes: Coup March 2012; Sanogo CNRDRE; internal junta divisions; Traoré nominal; Sanogo real; complete fragmentation
