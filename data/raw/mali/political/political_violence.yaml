        access_date: '2026-03-01'
      reliability: medium
    qualitative:
      assessment: 'Approximately 1,800 conflict-related deaths in 2012 — massive spike.
        The MNLA

        rebellion began January 2012; by April MNLA, Ansar Dine, MUJAO, and AQIM

        jointly controlled all of northern Mali. Military coup March 2012. Significant

        combat between FAMA and rebel/jihadist forces across northern Mali. Civilian

        massacres and atrocities documented in northern towns. Worst year for violence

        in the priority period.

        '
      features:
      - moderate_500_2000
      sources:
      - citation: ACLED Mali 2012; UCDP data
        url: https://acleddata.com
        type: ngo_report
        reliability: medium
      confidence: medium
      notes: Massive spike; MNLA + jihadist rebellion Jan-April seized north; coup
        March; civilian massacres documented
