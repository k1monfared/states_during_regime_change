    qualitative:
      assessment: 'Near-complete territorial control in 2010. Government controlled virtually all

        of Mali''s territory including the north. The previous Tuareg rebellions (2006-2009)

        had been suppressed or resolved through negotiations. ATT government maintained

        effective governance throughout the country. Minor banditry in the north but no

        organized territorial challenge to state authority.

        '
      features:
      - full_control_no_challenges
      sources:
      - citation: ACLED Mali data 2010; Uppsala Conflict Data Program
        url: https://acleddata.com
        type: ngo_report
        reliability: high
      confidence: high
      notes: Near-full control; previous Tuareg rebellion suppressed; ATT stable governance; minor northern banditry
