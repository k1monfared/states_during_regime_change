    qualitative:
      assessment: 'Significant isolation in 2012 following coup. ECOWAS suspended Mali. AU suspended

        Mali from all activities. Some embassies reduced staff or temporarily closed.

        US cut non-humanitarian aid. EU suspended budget support. International community

        refused to recognize junta. Transitional framework agreed with ECOWAS partially

        normalized some relations. Worst diplomatic isolation since independence.

        '
      features:
      - significant_isolation
      sources:
      - citation: Qualitative assessment Mali diplomatic isolation post-2012 coup
        url:
        type: academic_report
        reliability: high
      confidence: high
      notes: ECOWAS/AU suspension; reduced embassy presence; non-humanitarian aid cut; junta unrecognized; ECOWAS transition partial relief
