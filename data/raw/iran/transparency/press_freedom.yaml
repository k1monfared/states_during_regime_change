    qualitative:
      assessment: |
        Under the Pahlavi regime in 1960, press freedom was significantly constrained but not
        completely absent. SAVAK (the secret police, established 1957) monitored and censored
        media. Multiple newspapers existed but operated under implicit self-censorship; direct
        criticism of the Shah was forbidden. The 1960 period preceded the White Revolution
        and featured some political pluralism under pressure.
      features:
      - very_serious
      sources:
      - citation: "Encyclopaedia Iranica. 'Censorship in Persia.' Online edition."
        url: "https://www.iranicaonline.org/articles/censorship-sansur-in-persia/"
        type: academic
        reliability: high
      - citation: "PBS Wide Angle. 'Politics and the Press in Iran: Under the Pahlavis.'"
        url: "https://www.pbs.org/wnet/wideangle/uncategorized/politics-and-the-press-in-iran-under-the-pahlavis/2536/"
        type: news_report
        reliability: medium
      confidence: medium
      notes: "Pre-RSF era; qualitative estimate based on SAVAK censorship structure. RSF index starts 2002."
