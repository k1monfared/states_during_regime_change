        url: "https://worldjusticeproject.org/rule-of-law-index/"
        access_date: "2025-01-15"
      reliability: null
    qualitative:
      assessment: |
        Under Gaddafi's Jamahiriya system, the legal framework was formally governed
        by the Green Book ideology, Islamic law (sharia), and statutory codes. Laws were
        published in the Official Gazette (Al-Jarida Al-Rasmiyya) but practical
        application depended entirely on regime discretion. Gaddafi's decrees superseded
        formal law. No independent judiciary. Revolutionary courts operated outside normal
        legal framework. WJP did not include Libya in this period.
      features:
        - minimal_rule_by_decree
      sources:
        - citation: "Freedom House Libya Country Report"
          url: "https://freedomhouse.org/country/libya"
