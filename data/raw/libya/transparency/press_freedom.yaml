indicator: press_freedom
country: libya
dimension: transparency
years:
  1996:
    data_status: complete
    quantitative:
      value: 12
      unit: rsf_inverted_0_100
      source:
        citation: "Reporters Without Borders World Press Freedom Index (historical reconstruction); Freedom House Freedom of the Press"
        url: "https://rsf.org/en/ranking"
        access_date: "2025-01-15"
      reliability: medium
    qualitative:
      assessment: |
        Under Gaddafi's Jamahiriya system, all media was state-controlled. The Great
        Green Charter of Human Rights and the Penal Code criminalized criticism of
        the regime or its ideology. No independent newspapers, radio, or television
        existed. Foreign journalists required government approval. Journalists who
        violated red lines faced imprisonment or worse. Libya ranked among the world's
        worst countries for press freedom throughout the Gaddafi era. RSF did not
        produce formal scores for 1996; score reconstructed from FH Freedom of the
        Press and CPJ data.
      features:
        - no_press_freedom
      sources:
        - citation: "Freedom House Freedom of the Press 1997"
          url: "https://freedomhouse.org/report/freedom-press"
          type: "ngo"
          reliability: medium
        - citation: "Committee to Protect Journalists, Libya records"
          url: "https://cpj.org/mideast/libya/"
          type: "ngo"
          reliability: high
      confidence: medium
      notes: "RSF formal scoring began 2002; pre-2002 values reconstructed from FH and CPJ data; Libya consistently among worst globally"
