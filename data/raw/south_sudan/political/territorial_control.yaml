    qualitative:
      assessment: |
        South Sudan (as southern Sudan) was governed by the SPLM/A under the Comprehensive Peace Agreement (CPA) signed January 2005. The GOSS (Government of Southern Sudan) exercised nominal authority but large portions of the south remained contested or under parallel armed group control. Lord's Resistance Army (LRA) operated in the southeast. Inter-communal violence across Jonglei and other states. Multiple armed groups not fully integrated into SPLA. Government control significant but contested in many areas.
