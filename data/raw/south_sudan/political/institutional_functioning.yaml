    qualitative:
      assessment: |
        GOSS established July 2005 under CPA. Semi-autonomous government of southern Sudan with president (Kiir), legislature, and basic ministries. Institutional capacity extremely low — most civil servants untrained, no bureaucratic tradition. Courts essentially nonexistent outside Juba. Legislature met but had minimal policy function. Severely degraded from birth.
      features:
      - severely_degraded
      sources:
      - citation: "ICG: Southern Sudan: CPA Implementation (2005)"
        url: "https://www.crisisgroup.org/africa/horn-africa/south-sudan"
        type: think_tank
        reliability: high
      confidence: medium
      notes: "GOSS established; institutional capacity near zero; courts nonexistent outside Juba; severely degraded"

