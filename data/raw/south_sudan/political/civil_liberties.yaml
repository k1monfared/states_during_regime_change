indicator: civil_liberties
country: south_sudan
dimension: political
notes: >
  Freedom House Civil Liberties score scale 1-7 where 1=most free, 7=least free.
  South Sudan separately tracked from 2011 (independence). Before 2011 it was
  part of Sudan's assessment. The unit freedom_house_inverted means the raw
  FH CL score is stored and the transform (8-value)/7*100 is applied by scorer.
years:
  2005:
    data_status: partial
    quantitative:
      value: 7
      unit: freedom_house_inverted
      source:
        citation: "Freedom House: Sudan 2005 (covering southern Sudan) CL=7"
        url: "https://freedomhouse.org/country/sudan/freedom-world/2005"
        access_date: "2026-03-01"
      reliability: medium
    qualitative:
      assessment: |
        Southern Sudan under GOSS/SPLA had severe civil liberties restrictions. SPLA acted as both military and governing authority. No free press. Assembly restricted by security environment and SPLA. Arbitrary detention common. LRA attacks restricted movement in Equatoria. Freedom House rated Sudan overall CL=7 (worst). No civil liberties.
      features:
        - no_civil_liberties
      sources:
        - citation: "Freedom House: Sudan 2005"
          url: "https://freedomhouse.org/country/sudan/freedom-world/2005"
          type: ngo_report
          reliability: high
      confidence: medium
      notes: "GOSS/SPLA governing authority; SPLA arbitrary detention; FH Sudan CL=7; no civil liberties"

