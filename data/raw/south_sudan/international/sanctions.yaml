      reliability: medium
    qualitative:
      assessment: |
        Southern Sudan as part of Sudan subject to US comprehensive sanctions on Sudan (since 1997). UN had targeted sanctions on Sudan (Resolution 1556 - 2004, Darfur-related). However, US sanctions had exemptions for southern Sudan given CPA support. Practically, southern Sudan faced limited direct sanctions impact. Broad economic/humanitarian exceptions applied.
