indicator: sanctions
country: south_sudan
dimension: international
notes: >
  South Sudan as pre-independence GOSS was covered by Sudan sanctions.
  After independence July 2011, South Sudan faced no direct sanctions initially.
  UN arms embargo on South Sudan imposed July 2018 (UNSC Resolution 2428).
  US imposed targeted sanctions on specific individuals from 2017.
