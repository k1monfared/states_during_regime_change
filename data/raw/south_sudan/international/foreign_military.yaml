indicator: foreign_military
country: south_sudan
dimension: international
notes: >
  South Sudan hosted UNMISS (UN Mission in South Sudan) since independence in 2011,
  which succeeded UNMIS (UN Mission in Sudan). Pre-independence southern Sudan had UNMIS.
  UNMISS mandate included civilian protection after 2014 civil war expanded it.
  AMISOM/IGAD forces were not deployed directly but IGAD monitored ceasefire.
