indicator: fdi
country: south_sudan
dimension: international
notes: >
  South Sudan FDI was dominated by oil sector investment (Chinese, Malaysian,
  Indian oil companies) in the pre-independence CPA period. Post-independence
  FDI collapsed during civil war. World Bank data available from ~2012.
