indicator: refugee_flows
country: south_sudan
dimension: international
notes: 'South Sudan has experienced dramatic reversals in refugee dynamics. Pre-independence southern Sudanese were themselves
  refugees returning. Civil war 2013 created one of the world''s largest displacement crises (6+ million displaced by 2017
  out of ~12 million population). R-ARCSS 2018 allowed partial return. The Sudan war April 2023 reversed dynamics — South
  Sudan became a major recipient of Sudanese refugees (700,000+). UNHCR data primary source. Quantitative values are approximate
  refugees abroad (not full displacement).

  '
