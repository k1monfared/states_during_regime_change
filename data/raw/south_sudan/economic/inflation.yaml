    qualitative:
      assessment: |
        Pre-independence southern Sudan used Sudanese pound with limited formal price tracking. Juba consumer prices influenced by GOSS oil revenues and import costs. Estimated moderate-to-elevated inflation driven by oil-fueled demand in Juba and import costs (all goods imported). Estimated 10-20% inflation.
      features:
