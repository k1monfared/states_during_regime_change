indicator: inflation
country: south_sudan
dimension: economic
notes: >
  South Sudan CPI data available from World Bank from 2011 onwards. Pre-2011
  uses GOSS/southern Sudan estimates. South Sudan experienced severe hyperinflation
  in 2016 (800%+) following currency collapse. The South Sudan Pound (SSP) introduced
  at independence and rapidly devalued.
