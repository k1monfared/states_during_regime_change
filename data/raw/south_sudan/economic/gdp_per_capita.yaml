indicator: gdp_per_capita
country: south_sudan
dimension: economic
notes: >
  South Sudan GDP per capita data is extremely limited pre-independence 2011.
  World Bank began tracking from 2011. The peak was approximately $1,111 USD
  in 2011, fell sharply to $237 in 2016 during civil war. Oil-dependent economy.
  Pre-2011 estimates from GOSS budgets and CPA wealth-sharing data.
