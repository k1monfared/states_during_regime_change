indicator: trade_openness
country: south_sudan
dimension: economic
notes: >
  South Sudan is almost entirely import-dependent for consumer goods. Pre-secession
  oil exports went through Sudan. Post-independence, oil exported through Sudan pipeline.
  South Sudan is extremely oil-export dependent with almost no non-oil exports.
  Trade-to-GDP ratios heavily influenced by oil export volumes and prices.
  World Bank data available from 2011.
years:
  2005:
    data_status: partial
    quantitative:
      value: null
      unit: percent_gdp
      source:
        citation: "World Bank: Southern Sudan pre-2011 — no formal trade data"
        url: "https://data.worldbank.org/country/SS"
        access_date: "2026-03-01"
      reliability: null
    qualitative:
      assessment: |
        GOSS oil revenues flowing through Sudan pipeline. South Sudan (as GOSS) entirely dependent on oil exports and imported goods. Trade openness dominated by oil — high ratio if oil counted. Non-oil trade very restricted. Highly open via oil dependency.
      features:
        - open_70_100pct
      sources:
        - citation: "GOSS Trade Estimates 2005"
          url: "https://data.worldbank.org/country/SS"
          type: international_org
          reliability: low
      confidence: low
      notes: "Oil exports via Sudan; entirely import-dependent for consumer goods; highly open via oil"

