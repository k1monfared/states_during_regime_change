indicator: unemployment
country: south_sudan
dimension: economic
notes: >
  South Sudan unemployment data is extremely unreliable — most of the population is
  engaged in subsistence agriculture, pastoralism, or the informal economy.
  Formal unemployment metrics do not capture South Sudan's economic reality.
  ILO/World Bank data very limited. Crisis-level underemployment throughout.
years:
  2005:
    data_status: partial
    quantitative:
      value: null
      unit: percent_labor_force
      source:
        citation: "ILO: South Sudan unemployment — pre-independence, no formal data"
        url: "https://ilostat.ilo.org"
        access_date: "2026-03-01"
      reliability: null
    qualitative:
      assessment: |
        No formal labor market data for southern Sudan. Overwhelming majority (~85%) in subsistence farming and herding. Very limited formal sector — GOSS civil service and small Juba private sector. "Unemployment" by formal definition low but underemployment near universal. Crisis level structural underemployment.
      features:
        - crisis_gt_40pct
      sources:
        - citation: "ILO: Sudan Labor Market (covering southern Sudan) 2005"
          url: "https://ilostat.ilo.org"
          type: international_org
          reliability: low
      confidence: low
      notes: "No formal data; subsistence economy dominant; GOSS civil service tiny formal sector; crisis underemployment"

