indicator: fiscal_health
country: south_sudan
dimension: economic
notes: >
  South Sudan is one of the world's most oil-dependent states — 98%+ of
  government revenues come from oil. This creates extreme fiscal volatility.
  Debt-to-GDP data limited. IMF assessment used for recent years. The key metric
  for South Sudan is oil-dependence rather than traditional debt metrics.
  Pre-independence data refers to GOSS fiscal situation.
