    qualitative:
      assessment: |
        GOSS newly established. CPA oil revenues beginning. GOSS budget largely funded by oil transfers from Khartoum under CPA. Minimal debt at GOSS level. But dependence on single revenue source extreme. Technically low debt (no sovereign debt) but extreme oil-revenue dependency. Functionally, manageable in the sense of surplus/low-debt as long as oil flowed.
