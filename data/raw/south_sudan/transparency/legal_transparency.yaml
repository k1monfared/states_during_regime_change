indicator: legal_transparency
country: south_sudan
dimension: transparency
notes: >
  South Sudan legal transparency is extremely weak. WJP Rule of Law Index began
  covering South Sudan after independence — consistently bottom 5 globally.
  WJP 2015 score ~0.29, declining to ~0.25 by 2018 (scale 0-1). Civil war
  destroyed formal legal institutions. Courts dysfunctional. SPLM decree rule.
  R-ARCSS 2018 showed marginal improvement. Sudan war 2023 reversed progress.
  Pre-independence: GOSS operated under SPLM decree, minimal formal law.
years:
  2005:
    data_status: partial
    quantitative:
      value: null
      unit: wjp_score
      source:
        citation: "WJP Rule of Law Index: South Sudan not rated pre-independence"
        url: "https://worldjusticeproject.org/rule-of-law-index"
        access_date: "2026-03-01"
      reliability: null
    qualitative:
      assessment: |
        GOSS pre-independence. No formal legal code for southern Sudan. SPLM decree rule. Traditional/customary law operated in communities. No published laws, no formal courts (only military courts). No accessible legal framework.
      features:
        - no_accessible_framework
      sources:
        - citation: "ICG: Southern Sudan governance 2005 — SPLM decree rule"
          url: "https://www.crisisgroup.org/africa/horn-africa/south-sudan"
          type: think_tank
          reliability: medium
      confidence: medium
      notes: "SPLM decree rule; no formal legal code; customary law only; no accessible framework"

