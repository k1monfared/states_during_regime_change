indicator: statistical_transparency
country: south_sudan
dimension: transparency
notes: >
  South Sudan has one of the weakest statistical systems in the world. The National
  Bureau of Statistics (NBS) was established post-independence but with minimal
  capacity. No census completed (planned for 2014, never held). GDP data is
  oil-based estimate. Civil war destroyed what little capacity existed.
  World Bank IDA assessed statistical capacity extremely low throughout.
  IHSN/World Bank statistical capacity scores used where available.
