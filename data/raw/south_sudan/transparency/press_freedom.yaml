        access_date: "2026-03-01"
      reliability:
      value_source:
      series_id:
      calculated_value:
      discrepancy:
    qualitative:
      assessment: |
        GOSS pre-independence. Southern Sudan was part of Sudan which consistently ranked in bottom 10% for press freedom. SPLM controlled information. Journalists faced harassment. Very serious situation.
      features:
