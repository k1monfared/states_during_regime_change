indicator: press_freedom
country: south_sudan
dimension: transparency
notes: >
  South Sudan press freedom was briefly optimistic at independence 2011 but
  quickly deteriorated. RSF World Press Freedom Index: South Sudan ranked
  among world's worst — typically 130-180/180 range. Quantitative RSF
  0-100 scores not available separately from ranks; qualitative used.
  Civil war 2013+ made South Sudan one of world's most dangerous for journalists.
