indicator: extractive_transparency
country: south_sudan
dimension: transparency
notes: >
  South Sudan is not an EITI member. Oil sector (98% of government revenue)
  is completely opaque. No contracts published, no revenue figures independently
  verified. CNPC, Petronas, ONGC oil consortia operate without transparency.
  Some civil society pushed for EITI during 2011-2013 optimism but civil war
  ended all such efforts. Sudan war 2023 made EITI candidacy impossible.
  Pre-independence: oil under Sudan's GNPOC with zero transparency.
