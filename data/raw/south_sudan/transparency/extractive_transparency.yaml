      discrepancy:
    qualitative:
      assessment: |
        Pre-independence. GNPOC (Greater Nile Petroleum Operating Company) controlled oil — operated by CNPC, Petronas, ONGC with Sudan government. Complete opacity. CPA wealth-sharing formula transferred revenues to GOSS but no transparency on actual extraction figures. No disclosure.
