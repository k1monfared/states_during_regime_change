      unit: obs_score
      source:
        citation: "Open Budget Survey: South Sudan not covered pre-independence"
        url: "https://www.internationalbudget.org/open-budget-survey"
        access_date: "2026-03-01"
      reliability: null
    qualitative:
      assessment: |
        GOSS pre-independence. No formal budget published. CPA wealth-sharing formula provided oil revenues to GOSS but no public accounting. No budget documents publicly available. No information whatsoever.
      features:
        - no_information
      sources:
        - citation: "IBP: GOSS pre-independence budget 2005"
          url: "https://www.internationalbudget.org"
          type: think_tank
          reliability: low
      confidence: medium
      notes: "GOSS no formal budget; CPA oil revenues no public accounting; no information"

