indicator: budget_transparency
country: south_sudan
dimension: transparency
notes: >
  South Sudan has extremely weak budget transparency. Open Budget Survey (OBS)
  data began after independence. South Sudan consistently scores near the bottom
  globally — OBS scores 0-6/100 in most years. GOSS pre-independence had no
  meaningful budget disclosure. Civil war eliminated even minimal transparency.
  R-ARCSS 2018 brought marginal improvements. Sudan war 2023 reversed progress.
years:
