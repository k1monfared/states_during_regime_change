    qualitative:
      assessment: 'Constitutional Loya Jirga convened in late 2003 to draft and adopt a new constitution.

        The new Afghan constitution was adopted in January 2004. Institutions remained embryonic:

        the judiciary was non-functional in most provinces, the legislature did not yet exist,

        and the bureaucracy was understaffed and corrupt. International advisors filled critical

        government functions.

        '
      features:
      - collapsed_or_nominal
      sources:
      - citation: 'ICG, Afghanistan: The Constitutional Loya Jirga, December 2003'
        url: https://crisisgroup.org
        type: think_tank_report
        reliability: high
      confidence: medium
      notes: Constitution adopted January 2004; institutions still nominal in practice
