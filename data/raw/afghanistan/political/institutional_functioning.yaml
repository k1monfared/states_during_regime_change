    qualitative:
      assessment: 'Emergency Loya Jirga held in June 2002 established transitional government under Karzai.

        Nascent institutions were being created: a new Afghan National Army began forming,

        a new police force, and early judicial systems. However, institutions were extremely

        weak, fragmented, and dependent on international support. Warlords effectively controlled

        much of the country, undermining central institutional authority.

        '
      features:
      - collapsed_or_nominal
      sources:
      - citation: 'ICG, Afghanistan: Judicial Reform and Transitional Justice, January 2003'
        url: https://crisisgroup.org
        type: think_tank_report
        reliability: high
      confidence: medium
      notes: Emergency Loya Jirga June 2002; institutions being rebuilt from zero
