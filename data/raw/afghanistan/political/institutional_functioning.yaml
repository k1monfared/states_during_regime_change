    qualitative:
      assessment: 'Taliban rule replaced the collapsed mujahedeen government with a theocratic system that

        had no legislature, no elections, no independent judiciary, and no formal bureaucracy

        beyond religious enforcement. All state functions were performed through informal Islamic

        councils and the Office of the Supreme Leader. No modern state institutions existed or

        functioned in any recognizable form.

        '
      features:
      - no_functioning_institutions
      sources:
      - citation: ICG; Freedom House 1997 on Afghanistan
        url: https://freedomhouse.org
        type: ngo_report
        reliability: medium
      confidence: high
      notes: 'Taliban era: no legislature, no elections, theocratic governance'
