    qualitative:
      assessment: 'Parliamentary elections held in September 2005, establishing the Wolesi Jirga. The

        legislature was functioning nominally, the executive was elected, and a constitutional

        framework existed. However, institutions were still very weak: courts were corrupt and

        ineffective, the parliament included warlords and drug lords, and civil service capacity

        was minimal.

        '
      features:
      - severely_degraded
      sources:
      - citation: 'ICG, Afghanistan''s New Legislature: Making Democracy Work, May 2006'
        url: https://crisisgroup.org
        type: think_tank_report
        reliability: high
      confidence: medium
      notes: Parliament established 2005; but heavily influenced by warlords; weak institutional functioning
