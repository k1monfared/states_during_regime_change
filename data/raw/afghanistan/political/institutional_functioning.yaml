    qualitative:
      assessment: 'Institutional credibility collapsed in 2009 with the massively fraudulent presidential

        election. Karzai was re-elected after a first round result tainted by widespread

        fraud; the runoff was cancelled. Freedom House downgraded Afghanistan''s political

        rights from 5 to 6. The election fraud severely undermined the legitimacy of

        electoral institutions.

        '
      features:
      - severely_degraded
      sources:
      - citation: Freedom House 2010, Afghanistan, PR downgraded from 5 to 6; UN Electoral Mission
        url: https://freedomhouse.org
        type: ngo_report
