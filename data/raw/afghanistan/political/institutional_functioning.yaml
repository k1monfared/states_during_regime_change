    qualitative:
      assessment: 'Institutional collapse in 2001 as Taliban rule ended violently. The Bonn Agreement in

        December 2001 established an Interim Authority headed by Hamid Karzai, beginning the

        creation of new institutions from scratch. No functioning state institutions existed

        at the start of the year; by December, a minimal interim government was established.

        '
      features:
      - no_functioning_institutions
      sources:
      - citation: UN-supported Bonn Agreement, December 2001; Freedom House 2002
        url: https://freedomhouse.org
        type: government_document
        reliability: high
      confidence: medium
      notes: Regime change year; Bonn Agreement December 2001 begins reconstruction of institutions
  2002:
    data_status: partial
