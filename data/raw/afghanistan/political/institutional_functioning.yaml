    qualitative:
      assessment: 'Institutions began developing in 2004 with the first presidential election in October.

        A new constitution was in force. The Afghan National Army was forming and the civil

        service was being reconstructed. However, institutions remained severely fragile:

        judiciary largely dysfunctional, parliament not yet elected, and bureaucracy dependent

        on international aid and advisors. Freedom House PR improved to 5.

        '
      features:
      - severely_degraded
      sources:
      - citation: Freedom House, Freedom in the World 2005, Afghanistan, PR 5
        url: https://freedomhouse.org
        type: ngo_report
        reliability: medium
      confidence: medium
      notes: First presidential election; new constitution; but institutions severely underdeveloped
