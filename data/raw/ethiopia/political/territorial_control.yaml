      discrepancy:
    qualitative:
      assessment: 'Following Abiy Ahmed''s April 2018 accession, political liberalization reduced

        armed opposition and ethnic violence somewhat. The government nominally controlled

        all territory. However, intercommunal clashes (Somali-Oromia, various ethnic

        conflicts) displaced hundreds of thousands and created ungoverned spaces locally.

        '
      features:
      - minor_insurgencies_lt_10pct
      sources:
      - citation: 'ICG Conflict Alert: Ethiopia, 2018'
        url: https://www.crisisgroup.org/africa/horn-africa/ethiopia
        type: think_tank_report
        reliability: high
      confidence: medium
      notes: Regime change year; Abiy reforms opened political space; intercommunal violence spiked in transition period
  2019:
    data_status: complete
    quantitative:
