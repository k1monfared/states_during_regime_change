        url: https://www.crisisgroup.org/africa/horn-africa/ethiopia/b163-containing-volatile-ethiopia-tigray-conflict
        type: think_tank_report
        reliability: high
      confidence: high
      notes: Tigray War outbreak Nov 2020; Mekelle fell to federal forces Dec 2020; OLA active in Oromia
  2021:
    data_status: complete
