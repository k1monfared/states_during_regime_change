    qualitative:
      assessment: 'The Ethiopian government maintained nominal control over most territory in 2016

        but faced significant unrest in Oromia and Amhara regions. Protests, state of

        emergency, and security force deployment signaled contested legitimacy in major

        protest areas, though no armed group controlled significant territory.

        '
      features:
      - minor_insurgencies_lt_10pct
      sources:
      - citation: 'ICG Report: Ethiopia''s Spreading Strife, March 2017'
        url: https://www.crisisgroup.org/africa/horn-africa/ethiopia
        type: think_tank_report
        reliability: high
      confidence: medium
      notes: State of emergency Oct 2016; Oromo/Amhara protests; security forces deployed but no territorial loss
  2017:
    data_status: complete
