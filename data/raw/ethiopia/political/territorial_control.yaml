      calculated_value:
      discrepancy:
    qualitative:
      assessment: 'Government control remained nominal across Ethiopia but was seriously challenged

        in parts of Oromia by the Oromo Liberation Army (OLA/Shane). Intercommunal

        violence in multiple regions created zones of contested authority. The Sidama

        statehood vote added political tension but not armed contest for territory.

        '
      features:
      - significant_areas_outside_10_30pct
      sources:
      - citation: ACLED Data for Ethiopia, 2019, accessed 2026-03-01
        url: https://acleddata.com
        type: index_dataset
        reliability: high
      confidence: medium
      notes: OLA/Shane active in parts of Oromia; Sidama statehood movement; intercommunal violence widespread
  2020:
