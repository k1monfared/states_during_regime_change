      calculated_value:
      discrepancy:
    qualitative:
      assessment: 'Central government maintained territorial control in 2017, though the state of

        emergency (extended February 2017) reflected widespread unrest. Ongoing protests

        in Oromia and displacement from intercommunal violence in the Somali-Oromia border

        area indicated contested control at local levels.

        '
      features:
      - minor_insurgencies_lt_10pct
      sources:
      - citation: 'Human Rights Watch, ''Ethiopia: Crackdown Hits Peaceful Protesters'', 2017'
        url: https://www.hrw.org/world-report/2018/country-chapters/ethiopia
        type: ngo_report
        reliability: medium
      confidence: medium
      notes: State of emergency continued; Somali-Oromia intercommunal violence; TPLF still dominant in federal coalition
  2018:
