          Score for Ethiopia
        url: https://freedomhouse.org/country/ethiopia/freedom-world/2019
        access_date: '2026-03-01'
      reliability: medium
    qualitative:
      assessment: 'Civil liberties improved significantly following Abiy Ahmed''s
        April 2018 accession,

        with FH upgrading the score to 5. Political prisoners were released (including
        Merera

        Gudina, Bekele Gerba), internet restrictions eased, and the press was liberalized.

        The ATP was nominally maintained but enforcement was dramatically reduced.

        '
      features:
      - significant_restrictions
      sources:
      - citation: Freedom House, Freedom in the World 2019, Ethiopia
        url: https://freedomhouse.org/country/ethiopia/freedom-world/2019
        type: ngo_report
        reliability: medium
      confidence: high
      notes: FH score 5/7; political prisoners released; internet freedom improved;
        ATP still on books but less enforced
