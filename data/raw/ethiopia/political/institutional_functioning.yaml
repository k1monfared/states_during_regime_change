  2018:
    data_status: complete
    quantitative:
      value: 13
      unit: qualitative_scale
      source:
        citation: V-Dem Dataset v14, v2x_libdem, Ethiopia, 2018. Coppedge et al. (2024)
        url: https://v-dem.net/data/the-v-dem-dataset
        access_date: '2026-03-01'
      reliability: high
    qualitative:
      assessment: 'Institutional functioning improved modestly with Abiy Ahmed''s
        April 2018 reforms.

        Political prisoners were released, state of emergency lifted, and some independent

        media re-licensed. However, formal institutions remained dominated by the
        executive.

        V-Dem score improved to approximately 0.13, reflecting early liberalization.

        '
      features:
      - severely_degraded
      sources:
      - citation: V-Dem Dataset v14, v2x_libdem, Ethiopia, 2018
        url: https://v-dem.net/data/the-v-dem-dataset
        type: index_dataset
        reliability: high
      confidence: high
      notes: Regime change year; partial liberalization; state of emergency lifted;
        media opened; formal institutions still weak
