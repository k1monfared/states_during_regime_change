        access_date: '2026-03-01'
      reliability: high
    qualitative:
      assessment: 'Ethiopia''s V-Dem liberal democracy index score was approximately
        0.07 (7 on 0-100

        scale) in 2016, reflecting the highly authoritarian nature of EPRDF rule.
        The

        parliament was rubber-stamp, winning 100% of seats in 2015 elections. Courts
        lacked

        independence and the bureaucracy served the ruling party rather than citizens.

        '
      features:
      - severely_degraded
      sources:
      - citation: V-Dem Dataset v14, v2x_libdem, Ethiopia, 2016
        url: https://v-dem.net/data/the-v-dem-dataset
        type: index_dataset
        reliability: high
      confidence: high
      notes: EPRDF won 100% of parliament seats in 2015; V-Dem score ~0.07; state
        of emergency imposed
  2017:
    data_status: complete
