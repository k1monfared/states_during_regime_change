    qualitative:
      assessment: 'Press freedom reached its worst post-reform level in 2021. Tigray''s information

        blackout continued throughout the year. Journalists covering the conflict were

        systematically expelled from Tigray. Several media outlets were blocked or shut

        down. Ethiopia ranked near the bottom globally.

        '
      features:
      - very_serious
      sources:
      - citation: RSF World Press Freedom Index 2022, Ethiopia
        url: https://rsf.org/en/ethiopia
        type: ngo_report
        reliability: medium
      confidence: high
      notes: Tigray blackout; journalist expulsions; RSF ranked ~139th; near pre-reform lows
