      series_id:
      calculated_value:
      discrepancy:
    qualitative:
      assessment: 'Press freedom conditions improved further in 2019. Internet shutdowns became

        less frequent (though not eliminated). New private media outlets launched.

        RSF ranked Ethiopia around 100th — a dramatic improvement from pre-reform era.

        However arrests of journalists during the Jawar Mohammed protests in October 2019

        indicated limits to the liberalization.

        '
      features:
      - difficult
      sources:
      - citation: RSF World Press Freedom Index 2020, Ethiopia
        url: https://rsf.org/en/ethiopia
        type: ngo_report
        reliability: medium
      confidence: high
      notes: Peak reform-era press freedom; new outlets; ~100th globally; Jawar protest arrests a warning sign
  2020:
