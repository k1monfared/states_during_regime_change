    qualitative:
      assessment: 'Press freedom remained severely constrained in 2017. Ethiopia ranked around

        150th globally on RSF index. State of emergency provisions prohibited media

        coverage critical of the government. Several journalists remained detained

        under the ATP. Most independent media operated from diaspora exile.

        '
      features:
      - very_serious
      sources:
      - citation: RSF World Press Freedom Index 2017, Ethiopia
        url: https://rsf.org/en/ethiopia
        type: ngo_report
        reliability: medium
      confidence: high
      notes: State of emergency media restrictions; ATP journalist detentions; diaspora media dominant
  2018:
    data_status: complete
    quantitative:
      value: 38.5
      unit: rsf_inverted_0_100
      source:
        citation: RSF World Press Freedom Index 2019 (covers 2018 conditions), score for Ethiopia
        url: https://rsf.org/en/index
        access_date: '2026-03-01'
      reliability: medium
