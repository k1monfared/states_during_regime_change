      series_id:
      calculated_value:
      discrepancy:
    qualitative:
      assessment: 'Press freedom improved dramatically following Abiy Ahmed''s April 2018 reforms.

        Imprisoned journalists were released, banned media outlets were unblocked, and

        diaspora journalists returned to Ethiopia. The ATP was not immediately repealed

        but its enforcement was suspended. Ethiopia rose sharply in RSF rankings.

        '
      features:
      - difficult
      sources:
      - citation: RSF World Press Freedom Index 2019, Ethiopia (reflecting 2018 improvements)
        url: https://rsf.org/en/ethiopia
        type: ngo_report
        reliability: medium
      confidence: high
      notes: Regime change year; major liberalization of press; released journalists; diaspora media return
  2019:
