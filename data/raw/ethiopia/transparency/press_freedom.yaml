      series_id:
      calculated_value:
      discrepancy:
    qualitative:
      assessment: 'Press freedom deteriorated in 2020 following the Hachalu crackdown and Tigray War

        outbreak. Internet was shut down in the Tigray region (November 2020 onwards)

        and journalists covering the Tigray War faced expulsion, detention, and access

        restrictions. Several prominent journalists were arrested in the Hachalu

        assassination aftermath.

        '
      features:
      - very_serious
      sources:
      - citation: RSF World Press Freedom Index 2021, Ethiopia
        url: https://rsf.org/en/ethiopia
        type: ngo_report
        reliability: medium
      confidence: high
      notes: Tigray information blackout Nov 2020; journalist detentions; Hachalu crackdown; major regression
