    qualitative:
      assessment: 'Ethiopia ranked very low on press freedom in 2016 (approximately 142nd of 180

        countries, RSF score ~21). Multiple journalists were imprisoned under the

        Anti-Terrorism Proclamation. Major news outlets including Zone 9 bloggers faced

        prosecution. Internet shutdowns during the state of emergency blocked online media.

        '
      features:
      - very_serious
      sources:
      - citation: RSF World Press Freedom Index 2016, Ethiopia
        url: https://rsf.org/en/ethiopia
        type: ngo_report
        reliability: medium
      confidence: high
      notes: Pre-2022 RSF legacy methodology; ATP-based journalist prosecutions; Zone 9 bloggers; internet shutdowns
