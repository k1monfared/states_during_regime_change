    qualitative:
      assessment: Legal transparency in Ethiopia in 2005 was minimal. The EPRDF government
        published laws in the official Federal Negarit Gazeta but access was difficult
        and there was no freedom of information legislation. Anti-Terrorism Proclamation
        652/2009 (from 2009) and Charities and Societies Proclamation (2009) severely
        restricted civil society access to information. Rule of law was largely subordinated
        to party interests.
      features:
      - minimal_rule_by_decree
      sources:
