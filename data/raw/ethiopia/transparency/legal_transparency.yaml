  2016:
    data_status: complete
    quantitative:
      value: 36
      unit: wjp_open_govt_0_100
      source:
        citation: 'WJP Rule of Law Index 2016, Factor 3: Open Government, Ethiopia
          (score 0.36, converted to 36)'
        url: https://worldjusticeproject.org/rule-of-law-index
        access_date: '2026-03-01'
      reliability: medium
    qualitative:
      assessment: 'Ethiopia scored approximately 36/100 on WJP Factor 3 (Open Government)
        in 2016,

        reflecting difficult legal transparency. Laws were technically published in
        the

        Federal Negarit Gazette but limited public access to legal databases and

        unpredictable judicial enforcement undermined practical transparency.

        The Anti-Terrorism Proclamation''s broad application created legal uncertainty.

        '
      features:
      - difficult_arbitrary_enforcement
      sources:
      - citation: 'WJP Rule of Law Index 2016, Factor 3: Open Government, Ethiopia'
        url: https://worldjusticeproject.org/rule-of-law-index
        type: index_dataset
        reliability: medium
      confidence: medium
      notes: WJP score ~0.36 for Factor 3; ATP arbitrary enforcement; limited public
        legal database access
