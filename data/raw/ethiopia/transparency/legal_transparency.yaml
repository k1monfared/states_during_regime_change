        url: https://www.hrw.org/africa/ethiopia
        type: ngo_report
        reliability: high
      confidence: medium
      notes: No FOI law; Negarit Gazeta published but not searchable; Charities Proclamation
        (2009) restricted civil society; WJP not available for Ethiopia in this period
