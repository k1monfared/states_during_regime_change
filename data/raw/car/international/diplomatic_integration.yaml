indicator: diplomatic_integration
country: car
dimension: international
notes: >
  CAR is a recognized UN/AU member throughout. Diplomatic isolation brief after
  coups (2003, 2013) then restored. Wagner/Africa Corps association damaged
  Western relations from 2018 onward but did not cause formal isolation.
  France's Opération Sangaris (2013-2016) and MINUSCA (2014-present) reflect
  ongoing international engagement. Russia relationship shifted from partner to
  concern for Western countries. AU PSC has frequently discussed CAR.
