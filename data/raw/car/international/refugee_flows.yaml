indicator: refugee_flows
country: car
dimension: international
notes: >
  CAR refugee and IDP data from UNHCR. CAR population ~4.2M in 2013, ~5.5M by 2025.
  Pre-2013 conflict periods (Bozizé insurgency 2002-2003, Bush War 2005-2008)
  produced significant displacement. 2013 Séléka coup triggered catastrophic
  displacement — ~1M refugees abroad + ~600K IDPs by end 2013.
  Peak displacement: ~700K refugees + ~600K IDPs (~25% of population) in 2014-2016.
  Post-APRC 2019 some return movements. Displacement remains severe.
