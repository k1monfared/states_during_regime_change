indicator: fdi
country: car
dimension: international
notes: >
  CAR FDI data from UNCTAD/World Bank. FDI extremely low throughout — CAR
  consistently in bottom tier globally for FDI attraction. Primary sectors:
  diamonds (artisanal, Kimberley Process issues), timber, gold.
  2013 Séléka coup caused FDI collapse. Wagner/Africa Corps presence created
  Russian mining investment (gold, diamonds) from 2018 but this is largely
  opaque extraction not standard FDI reporting. Values are UNCTAD reported FDI.
