indicator: foreign_military
country: car
dimension: international
notes: >
  CAR has had continuous foreign military presence since early 2000s.
  France Opération Boali 2002-2016; France Opération Sangaris Dec 2013-Oct 2016.
  FOMUC (CEMAC, 2002-2008), MICOPAX (ECCAS, 2008-2013), MISCA (AU, Dec 2013-Sep 2014).
  MINUSCA (UN) September 2014-present. Wagner Group Dec 2017/early 2018-Jun 2023.
  Africa Corps (successor to Wagner) June 2023-present.
  Foreign military presence has been invited by CAR government throughout.
  Scale escalated dramatically with Wagner 2018 and Africa Corps 2023+.
