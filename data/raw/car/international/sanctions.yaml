indicator: sanctions
country: car
dimension: international
notes: >
  CAR has been under UN Security Council arms embargo since December 2013
  (UNSC Resolution 2127). Targeted sanctions on armed group leaders added 2014.
  No comprehensive bilateral economic sanctions (EU/US). Kimberley Process
  suspended CAR diamond exports May 2013, partially reinstated 2015 for
  government-controlled areas. International isolation during 2003 and 2013 coups
  was brief — restored after transitional government formation. UN sanctions
  regime focused on arms and targeted individuals remains in place.
