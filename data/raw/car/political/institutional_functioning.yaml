indicator: institutional_functioning
country: car
dimension: political
notes: >
  CAR institutions have been chronically weak. The state is classified as
  fragile by all metrics. Parliament has functioned intermittently.
  Bozizé era (2003-2013): minimal institutional function, presidential decree.
  2013 coup destroyed residual institutions. 2014-2016: transitional period,
  institutions rebuilding. Touadéra 2016 elections restored some function.
  Wagner presence 2018+ bypassed formal institutions. Courts dysfunctional.
