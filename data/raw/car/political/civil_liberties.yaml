indicator: civil_liberties
country: car
dimension: political
notes: >
  Freedom House Civil Liberties (CL) score for CAR: 1=most free, 7=least free.
  CAR consistently rated 6-7 throughout most of this period.
  Scoring: (8 - FH_CL_value) / 7 * 100.
  Pre-2013: CL=6 (severe restrictions). 2013-2015 coup: CL=7 (no civil liberties).
  Post-2016: CL=6-7 (between severe and no liberties). Wagner 2018+ added abuses.
