indicator: elite_cohesion
country: car
dimension: political
notes: >
  CAR elite cohesion chronically fractured. Patassé era marked by coups and
  factionalism. Bozizé 2003 coup created factional transition. Séléka coalition
  2012-2013 itself fragmented. Djotodia unable to control Séléka. Touadéra
  era relies heavily on Wagner/Africa Corps, creating parallel power structures.
  ICG and UN Panel of Experts primary sources for qualitative assessment.
