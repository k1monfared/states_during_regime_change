indicator: territorial_control
country: car
dimension: political
notes: >
  CAR has chronically weak territorial control. The state has never effectively
  controlled territory outside Bangui. Patassé era (1993-2003) had multiple
  coup attempts. Bozizé (2003-2013) controlled Bangui but not the north/east.
  2013 Séléka coup — militia coalition controlled country briefly but fragmenting.
  Anti-Balaka emergence 2013. Post-2014: fragmented control with dozens of armed
  groups controlling most territory. MINUSCA presence but limited reach.
  Wagner/Russia 2018+ improved government control somewhat in select areas.
