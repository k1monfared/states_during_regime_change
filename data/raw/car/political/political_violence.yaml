indicator: political_violence
country: car
dimension: political
notes: >
  CAR has chronic high political violence. ACLED tracks CAR from 2000.
  Key events: Bozizé coup 2003; Séléka coup 2013; anti-Balaka 2013-2014;
  MINUSCA deployment 2014; CPC offensive 2020-2021. Annual fatalities
  typically 1,000-5,000 for conflict-era years, spiking in 2013-2014.
  Wagner atrocities from 2018+ added new violence dimension.
