indicator: unemployment
country: car
dimension: economic
notes: >
  CAR unemployment data is extremely limited — ILO/World Bank formal unemployment
  figures largely unavailable or unreliable given predominantly subsistence
  agriculture economy (80%+ rural). Formal sector is tiny — government, few
  commercial establishments. Most work is informal/subsistence. Quantitative
  values are ILO modeled estimates where available; largely qualitative assessment.
  Civil war 2013+ collapsed the small formal sector. Features reflect functional
  economic participation, not narrow formal unemployment.
years:
  2000:
    data_status: partial
    quantitative:
      value:
      unit: percent_labor_force
      source:
        citation: "ILO: CAR unemployment data limited pre-2010"
        url: "https://www.ilo.org/shinyapps/bulkexplorer"
        access_date: "2026-03-01"
      reliability:
      value_source:
      series_id:
      calculated_value:
      discrepancy:
    qualitative:
      assessment: |
        Formal unemployment effectively unmeasured. Economy ~80% subsistence agriculture. Small civil service and commercial sector. Political instability under Patassé. Very high effective unemployment in formal sense; subsistence absorbs most. Very high informal underemployment.
      features:
      - very_high_25_40pct
      sources:
      - citation: "ILO: CAR labor market assessment"
        url: "https://www.ilo.org"
        type: ngo_report
        reliability: low
      confidence: low
      notes: "No formal data; subsistence economy; tiny formal sector; very high effective unemployment"

