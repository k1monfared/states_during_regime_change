indicator: gdp_per_capita
country: car
dimension: economic
notes: >
  CAR GDP per capita consistently among world's lowest. World Bank current USD.
  Peak approximately 2012-2013 before Séléka coup collapse. 2013 coup caused
  ~30% GDP contraction. Slow recovery with Wagner/Africa Corps era. Subsistence
  agriculture economy; formal GDP measurement difficult. Data from World Bank
  World Development Indicators.
