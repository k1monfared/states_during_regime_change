indicator: fiscal_health
country: car
dimension: economic
notes: >
  CAR fiscal health chronically poor. Government revenue ~10-14% of GDP.
  Persistent fiscal deficits. External debt/GDP fluctuated around 60-120%.
  HIPC debt relief 2007 significantly reduced debt burden. 2013 Séléka coup
  caused revenue collapse — fiscal crisis. Donor grants constitute major
  share of government revenue. IMF/World Bank primary sources. Civil servant
  salaries frequently in arrears — characteristic of CAR fiscal fragility.
