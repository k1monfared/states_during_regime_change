indicator: inflation
country: car
dimension: economic
notes: >
  CAR inflation data from World Bank/IMF. Generally moderate inflation — CFA franc
  (XAF) pegged to euro through CEMAC monetary union provides inflation anchor.
  2013 coup caused severe supply disruption and informal price spikes, though
  CFA peg prevented official hyperinflation. 2014 was worst official year.
  Data from World Bank World Development Indicators and IMF Article IVs.
