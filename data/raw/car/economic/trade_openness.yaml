indicator: trade_openness
country: car
dimension: economic
notes: >
  CAR trade openness (exports+imports as % of GDP) from World Bank WDI.
  CAR is landlocked — trade depends on Cameroon (Douala port) and DRC river routes.
  Trade/GDP ratio fluctuates with conflict. Pre-2013 typically 30-50% of GDP.
  Séléka coup 2013 caused severe trade collapse. Wagner/Africa Corps era saw
  partial recovery but ongoing insecurity limits trade. Cotton, diamonds, timber
  main exports; fuel, manufactured goods imports dominate.
