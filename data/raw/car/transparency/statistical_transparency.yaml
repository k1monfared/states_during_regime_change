indicator: statistical_transparency
country: car
dimension: transparency
notes: >
  CAR statistical capacity from World Bank Statistical Capacity Indicator (SCI).
  CAR typically scores 15-35/100 — among world's lowest. National statistical
  office (ICASEES) has very limited capacity. 2013 coup disrupted data collection
  entirely — no population census, limited surveys, GDP estimates unreliable.
  World Bank discontinued SCI in 2022, replaced by Statistical Performance
  Indicators (SPI). Values approximate where available.
