indicator: budget_transparency
country: car
dimension: transparency
notes: >
  CAR budget transparency consistently among world's worst. Open Budget Survey
  (IBP) scores: 2010 ~3/100, 2012 ~6/100. 2013 coup caused complete collapse
  of budget process. Post-coup recovery minimal. Civil servants unpaid for months
  during 2013-2015. Wagner/Africa Corps era created parallel fiscal flows
  outside any budget process. IBP OBS and qualitative assessment primary sources.
