indicator: press_freedom
country: car
dimension: transparency
notes: >
  CAR press freedom from RSF World Press Freedom Index and CPJ. CAR ranked
  typically 95-140/180. Worse than regional average but not as extreme as
  South Sudan or Eritrea. 2003 Bozizé coup — some press restrictions.
  2013 Séléka coup — journalists targeted, some expelled, no press freedom briefly.
  Wagner/Africa Corps era: journalists covering Wagner activities face severe danger.
  Quantitative RSF 0-100 scores not separately available; qualitative assessment used.
  All quantitative values set to null to avoid scoring distortions from RSF ranks.
years:
