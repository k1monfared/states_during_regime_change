      series_id:
      calculated_value:
      discrepancy:
    qualitative:
      assessment: |
        Patassé era. Some independent radio and print media in Bangui. Government-controlled radio dominant. Journalists covering sensitive topics (coup attempts, government corruption) harassed. Serious restrictions but some space. Very serious.
      features:
      - very_serious
      sources:
      - citation: "RSF: CAR 2000"
        url: "https://rsf.org/en/central-african-republic"
        type: ngo_report
