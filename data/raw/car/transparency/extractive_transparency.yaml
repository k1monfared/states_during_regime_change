indicator: extractive_transparency
country: car
dimension: transparency
notes: >
  CAR has never joined EITI. Natural resources: diamonds (artisanal, conflict
  diamonds historically), gold, timber. Kimberley Process member — suspended
  May 2013 after Séléka coup due to conflict diamonds, partially reinstated 2015
  for government-controlled areas. Wagner/Africa Corps extractive operations
  from 2018 entirely opaque — gold and diamond revenues flow to Russia.
  No formal extractive disclosure framework at any point in this period.
  Regime is entirely non-disclosure/opaque with varying degrees.
