indicator: legal_transparency
country: car
dimension: transparency
notes: >
  CAR legal transparency extremely limited. No WJP Rule of Law Index data before
  2015. When available, WJP scores for CAR are among world's lowest (~0.25-0.30/1.0).
  Legal system is primarily French civil law in theory; in practice, laws unpublished,
  enforcement arbitrary, access to courts limited to Bangui. 2003 and 2013 coups
  completely dissolved legal framework. Wagner/Africa Corps parallel governance
  replaced formal legal processes in vast areas. No Freedom of Information law.
