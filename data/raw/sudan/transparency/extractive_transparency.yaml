    data_status: partial
    quantitative:
      value: 1
      unit: eiti_compliance_scale
      source:
        citation: "EITI — Sudan not a member; no oil revenue disclosure; qualitative fallback"
        url: "https://eiti.org/countries/sudan"
        access_date: "2026-03-01"
      reliability: low
    qualitative:
      assessment: |
        Sudan was a significant oil producer in 2004 (producing approximately 250,000-300,000 barrels/day through GNPOC joint ventures with China, Malaysia, India). Oil revenues were the primary government income source following 1999 production start. Under NCP/Bashir, all oil revenues were managed opaquely with no public disclosure. Sudan was not a member of EITI and had no intention of joining. Government-CNPC (China) and Petronas contracts were secret. Revenue flows entirely opaque. National Petroleum Commission controlled by NCP loyalists. No disclosure of production volumes, contract terms, or revenue distribution. Completely opaque.
      features:
        - no_disclosure_opaque
      sources:
        - citation: "Global Witness: Sudan Oil Revenues (2004)"
          url: "https://www.globalwitness.org/en/campaigns/oil-gas-and-mining/sudan/"
          type: ngo_report
          reliability: medium
        - citation: "EIA: Sudan Country Analysis Brief"
          url: "https://www.eia.gov/international/analysis/country/SDN"
          type: government
          reliability: medium
        - citation: "EITI Country Data — Sudan not a member"
          url: "https://eiti.org/countries/sudan"
          type: international_org
          reliability: high
      confidence: high
      notes: "Sudan not EITI member; oil revenues opaque under NCP; GNPOC contracts secret; no public disclosure"

