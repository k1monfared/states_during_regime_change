indicator: extractive_transparency
country: sudan
dimension: transparency
notes: >
  Sudan has significant oil and gold sectors. Oil production peaked pre-2011;
  South Sudan secession 2011 took ~75% of oil fields. Gold became primary
  extractive export post-2011, largely controlled by RSF/Hemetti through
  Janjaweed-linked companies (Al Junaid). Sudan never joined EITI under Bashir.
  Transitional government 2019-2021 expressed interest in EITI membership.
  2023 war destroyed all extractive transparency mechanisms.
years:
