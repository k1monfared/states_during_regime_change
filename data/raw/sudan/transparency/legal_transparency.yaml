    qualitative:
      assessment: |
        Sudan was not covered by WJP Rule of Law Index before ~2014. Under the NCP/Bashir regime, the legal framework was entirely opaque. Laws were issued by presidential decree without publication or public notice. Courts were subordinated to the executive. The National Intelligence and Security Service (NISS) operated outside any legal accountability. Sharia-based legislation applied selectively and inconsistently. No accessible framework for citizens or businesses to understand applicable rules.
      features:
      - no_accessible_framework
      sources:
      - citation: "Freedom House Freedom in the World, Sudan 2004"
        url: "https://freedomhouse.org/country/sudan/freedom-world/2004"
        type: ngo_report
