        Malawi had no foreign military presence on its territory in 2005. The Malawi
        Defence Force (MDF) maintained full sovereignty. Malawi contributed troops to
        UN peacekeeping operations abroad but hosted no foreign military forces at home.
        This status has been consistent throughout Malawi's post-independence history.
      features:
