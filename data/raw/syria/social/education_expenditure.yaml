    qualitative:
      assessment: "Syria allocated 5.13% of GDP to education in 2009, placing it in the 'moderate' category (4-6% of GDP) and notably above the average for lower-middle income countries. This reflected decades of Ba'athist state investment in public education as a foundation of social policy and regime legitimacy. Education consumed 19.18% of total government expenditure — nearly one-fifth of the budget. Syria had achieved relatively high literacy rates (approximately 84% adult literacy) and near-universal primary school enrollment. The free public education system extended from primary through university level. This strong education investment was a structural feature of the Syrian developmental state model."
      features:
        - moderate_4_6pct
      sources:
        - citation: "World Bank WDI, SE.XPD.TOTL.GD.ZS, Syria, 2009"
          type: official_statistics
          reliability: high
      confidence: high
      notes: "Only pre-war data point available; all subsequent years have no World Bank data. Education % of government expenditure at 19.18% — highest level before series ends."
