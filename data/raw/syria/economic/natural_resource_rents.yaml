      assessment: "Syria's total natural resource rents were modest at 3.3% of GDP in 2009, with oil being the dominant component at ~3.0%. Syria was a mid-tier oil producer at that time, producing approximately 350,000-400,000 barrels per day, but oil production had been declining from its early 2000s peak. Gas rents were minimal; mineral and forest rents negligible. This low dependence on resource rents reflects Syria's relatively diversified pre-war economy."
