    qualitative:
      assessment: "The 2022 Gini figure of 26.6 appears remarkably low — paradoxically lower than the 2009 pre-war figure of 40.4. This counterintuitive result likely reflects a compositional shift in the survey population rather than genuine equality improvement. Surveys in war-affected countries often cover accessible (typically urban, regime-controlled) populations; the very poor in conflict zones and refugee camps are systematically excluded. The top quintile share dropped sharply from 47.2% to 35.9%, possibly reflecting capital flight and elite asset stripping rather than income compression. Caution: this figure should not be interpreted as reduced inequality."
