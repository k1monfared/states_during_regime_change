    qualitative:
      assessment: "Syria's Gini coefficient of 40.4 in 2009 places it in the moderately elevated inequality range. The top quintile received 47.2% of income while the bottom quintile received only 6.3%, a ratio of roughly 7.5x. This level of inequality, combined with high youth unemployment and the impacts of a prolonged drought, created significant social grievances that contributed to the 2011 uprising. The data likely derives from a 2003-2007 household survey; pre-war surveys for Syria are sparse."
      features:
      - elevated_40_50
      sources:
      - citation: "World Bank WDI, SI.POV.GINI, Syria, 2009"
        type: official_statistics
        reliability: medium
      confidence: medium
      notes: "WB figure may reflect survey data from 2003-2007 period applied to 2009; exact survey year unclear."
