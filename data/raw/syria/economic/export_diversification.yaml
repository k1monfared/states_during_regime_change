    qualitative:
      assessment: 'Pre-war Syria had moderately concentrated exports: petroleum products were ~38% of merchandise exports (WB TX.VAL.FUEL.ZS.UN 2009=37.82), with the remainder spread across agricultural goods, textiles, chemicals, and manufactures. Export base more diverse than Gulf oil states but petroleum still dominant.'
      features:
        - moderate_concentration_0_20_0_35
      sources:
        - citation: "World Bank WDI, TX.VAL.FUEL.ZS.UN, Syria, 2009, accessed 2026-03-03"
          url: "https://data.worldbank.org/indicator/TX.VAL.FUEL.ZS.UN"
          type: official_statistics
          reliability: medium
      confidence: low
      notes: No direct HHI data available; feature assessment based on fuel share (37.82%) as proxy for concentration with qualitative judgment about non-fuel export spread.
