    qualitative:
      assessment: "Political stability deteriorated to -0.81, 22nd percentile, in 2010 — the year before the uprising but as the Arab Spring was taking shape elsewhere. The prolonged drought (2006-2010) had generated massive rural displacement and economic stress, and governance surveys were detecting rising instability risk. Tunisia's revolution began in December 2010. Syria's WGI score reflects pre-existing vulnerability that would erupt the following year."
      features:
      - significant_instability
      sources:
      - citation: "World Bank WGI, PV.EST, Syria, 2010"
        type: official_statistics
        reliability: medium
      confidence: medium
      notes: "Drought impacts and Arab Spring regional context; score reflects pre-uprising vulnerability."
