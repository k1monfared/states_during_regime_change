    qualitative:
      assessment: "Syria's political stability score in 2009 was -0.51, placing it at the 27th percentile — relatively moderate given the region. The Assad regime maintained internal stability through repression rather than legitimate governance, but had avoided large-scale internal conflict. The country faced concerns related to cross-border spillovers from Iraq and relations with Israel/Lebanon, as well as underlying social tensions from drought and unemployment. The 27th percentile reflects a fragile but functioning authoritarian state prior to the Arab Spring."
      features:
      - mild_instability
      sources:
      - citation: "World Bank WGI, PV.EST, Syria, 2009"
        type: official_statistics
        reliability: medium
      confidence: medium
      notes: "Pre-uprising period; surface stability maintained through authoritarian repression."
