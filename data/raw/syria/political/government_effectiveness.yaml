    qualitative:
      assessment: "Syria's government effectiveness score in 2009 was -0.49, placing it at the 39th percentile — relatively moderate for the region. Despite deep authoritarian repression, the Assad regime maintained functional state institutions including a civil service, public education system, and basic infrastructure. The Ba'athist state had built substantial administrative capacity since the 1970s. The relatively high percentile (39th) for government effectiveness contrasts with very low corruption and political stability scores, reflecting assessors' judgment that the regime delivered basic services while remaining highly predatory."
      features:
      - low_effectiveness
      sources:
      - citation: "World Bank WGI, GE.EST, Syria, 2009"
        type: official_statistics
        reliability: medium
      confidence: medium
      notes: "Pre-war; state functioned despite authoritarianism; relatively high among MENA peers."
