    qualitative:
      assessment: |
        No functioning East Timorese state institutions. Indonesian administration
        collapsed after referendum. INTERFET deployed. UNTAET transitional
        administration established in late 1999. All governance functions performed
        by UN. No courts, legislature, or elected government. Building from zero.
      features:
        - no_functioning_institutions
      sources:
        - citation: "UNTAET establishment reports"
          url: "https://www.un.org/en/peacekeeping/missions/past/unmiset/"
          type: official_statistics
          reliability: high
      confidence: high
      notes: "UNTAET taking over; no East Timorese institutions; building from zero"
