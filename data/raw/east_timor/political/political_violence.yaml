years:
  1999:
    data_status: complete
    quantitative:
      value: 1500
      unit: conflict_deaths_per_year
      source:
        citation: "UNHCR/ICG East Timor 1999 crisis reports"
        url: "https://www.crisisgroup.org"
        access_date: "2026-03-01"
      reliability: medium
    qualitative:
      assessment: |
        Catastrophic political violence. Following the independence referendum
        (August 30, 1999), Indonesian military (TNI) and pro-Indonesia militia
        conducted systematic destruction campaign. Estimated 1,000-2,000+ killed,
        thousands more disappeared. 250,000+ forced into West Timor as refugees.
        ~80% of infrastructure destroyed. INTERFET deployed in late September 1999
        to halt violence. Worst violence in East Timor's modern history.
      features:
        - moderate_500_2000
      sources:
        - citation: "UNHCR East Timor crisis; ICG reports 1999"
          url: "https://www.crisisgroup.org"
          type: think_tank_report
          reliability: high
        - citation: "CAVR Chega! Report on 1999 violence"
          url: "https://www.etan.org/news/2006/cavr.htm"
          type: think_tank_report
          reliability: high
      confidence: medium
      notes: "Post-referendum TNI/militia destruction; 1000-2000+ killed; INTERFET deployment"
