      reliability: medium
    qualitative:
      assessment: |
        Official unemployment approximately 14% in 1995. However, Kenya's official
        unemployment statistics significantly understate the labor market problem given
        the massive informal economy (jua kali sector). Underemployment and informal
        employment are pervasive. The formal unemployment rate was elevated in the
        stagnant Moi-era economy.
      features:
        - elevated_10_15pct
      sources:
        - citation: "World Bank unemployment estimates Kenya 1995; ILO Africa employment data"
          url: "https://data.worldbank.org/indicator/SL.UEM.TOTL.NE.ZS?locations=KE"
          type: international_organization
          reliability: medium
      confidence: medium
      notes: "Kenya's informal sector (jua kali) absorbs large numbers; formal unemployment rate understates true labor market distress. Formal unemployment ~14% maps to high_gt_15pct in context."
