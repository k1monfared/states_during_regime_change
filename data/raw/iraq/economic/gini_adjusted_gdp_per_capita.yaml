indicator: gini_adjusted_gdp_per_capita
country: iraq
dimension: economic
notes: "Pre-computed derived value: GDP_pc × (1 − Gini/100). Iraq has only 3 Gini survey years (2006, 2012, 2023); all other years are missing."
