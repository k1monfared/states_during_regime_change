        type: academic
        reliability: high
      - citation: "Tripp, Charles. A History of Iraq. Cambridge University Press, 2000."
        type: academic
        reliability: high
      confidence: medium
      notes: "Institutions functional but fully subordinated to Saddam Hussein and Ba'ath Party."

