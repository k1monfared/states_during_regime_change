      sources:
      - citation: "Coalition Provisional Authority Order 2 (Dissolution of Iraqi Army, May 2003)"
        type: government
        reliability: high
      confidence: low
      notes: "Regime change year; Iraqi army dissolved May 2003; no reliable data"
