    data_status: complete
    quantitative:
      value: 600
      unit: total_displaced_thousands
      source:
        citation: UNHCR — Serbia/FRY hosted very large refugee population from Bosnia/Croatia wars
        url: https://www.unhcr.org
        access_date: '2026-03-01'
      reliability: medium
    qualitative:
      assessment: 'Serbia/FRY in 1995 hosted one of the largest refugee populations in Europe. After

        Dayton Agreement and Croatian Operation Storm (August 1995), massive influx of

        Krajina Serb refugees to Serbia (~200,000). Total refugee/IDP population in Serbia

        approximately 600,000+ — from Bosnia, Croatia, and internal Kosovo displacement.

        Massive humanitarian burden.

        '
      features:
      - net_returns_minimal_displacement
      sources:
      - citation: UNHCR
        url: https://www.unhcr.org
        type: international_organization
        reliability: medium
      confidence: medium
      notes: ~600K refugees/IDPs in Serbia; Krajina expulsion Aug 1995; Bosnia refugees; massive burden
