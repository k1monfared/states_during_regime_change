indicator: fiscal_health
country: drc
dimension: economic
notes: >
  DRC fiscal health: World Bank/IMF debt/GDP data.
  Mobutu era (1990-1996): catastrophic debt from kleptocracy and hyperinflation;
  effectively in arrears on all external debt; ~200-400%+ debt/GDP (mostly external).
  Kabila (L-D) (1997-2001): still in arrears; debt restructuring begins.
  Second Congo War (1998-2003): fiscal collapse; debt ~200-300% GDP.
  HIPC process: Decision Point 2003; Completion Point July 2010.
  Post-HIPC (2010-2015): debt drops to ~20-30% GDP after debt relief.
  Constitutional crisis (2016-2018): deficit spending; debt rising.
  Tshisekedi era (2019-2023): IMF programs; some stabilization ~15-25% GDP.
  AFC/M23 (2024-2025): fiscal pressures from eastern loss; rising deficits.
