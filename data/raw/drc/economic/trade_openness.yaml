indicator: trade_openness
country: drc
dimension: economic
notes: >
  DRC trade/GDP ratio: World Bank WDI (exports+imports)/GDP.
  Mobutu era (1990-1996): declining trade as economy collapses; ~40-50% but falling.
  Second Congo War (1998-2003): informal/illicit trade replaces formal; official figures ~50-70%.
  Post-war recovery (2003-2010): formal trade recovering with mining boom; 50-80%.
  Kabila era (2011-2018): mining exports dominant; cobalt/copper; trade ~50-70%.
  Tshisekedi era (2019-2025): trade ~50-65% with eastern disruption depressing figures.
  Note: DRC trade data is unreliable due to large informal and illicit trade in minerals.
