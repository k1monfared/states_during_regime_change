    data_status: complete
    quantitative:
      value: 230
      unit: usd_current_or_constant
      source:
        citation: "World Bank WDI: DRC GDP per capita 1990"
        url: "https://data.worldbank.org/indicator/NY.GDP.PCAP.CD?locations=CD"
        access_date: "2026-03-01"
      reliability: medium
    qualitative:
      assessment: |
        Zaïre under Mobutu. Economy declining from chronic mismanagement. GDP per capita
        ~$230 current USD. Significant decline from higher levels in 1970s. Moderate decline
        relative to regional peers. Kolwezi/Katanga mining still operating.
      features:
        - significant_decline_50_70pct
      sources:
        - citation: "World Bank WDI: Zaïre/DRC 1990"
          url: "https://data.worldbank.org/indicator/NY.GDP.PCAP.CD?locations=CD"
          type: government_report
          reliability: medium
      confidence: medium
      notes: "GDP ~$230; declining from Mobutu mismanagement; significant decline from peak"

