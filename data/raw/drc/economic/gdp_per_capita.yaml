indicator: gdp_per_capita
country: drc
dimension: economic
notes: >
  DRC GDP per capita: World Bank WDI (current USD). One of the world's poorest countries
  throughout the period. Mobutu era economic collapse meant falling GDP from ~$230 in 1990
  to ~$100 by 1994-1996. Second Congo War brought GDP to ~$100-130 range 1998-2003.
  Post-war recovery slow: ~$130-180 2003-2008. Mining boom and peace: ~$200-380 2009-2014.
  Peak ~$550 (2019-2020 range). Recent: ~$600 (2025 estimated).
  Quantitative transform: (value / peak_value) * 100. Peak ~$600.
years:
