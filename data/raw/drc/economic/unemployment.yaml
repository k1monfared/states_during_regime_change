indicator: unemployment
country: drc
dimension: economic
notes: 'DRC unemployment: no meaningful official ILO unemployment data for most of the period. The economy is overwhelmingly
  subsistence/informal — official unemployment statistics capture only a tiny formal sector. During conflict years, formal
  sector employment collapses entirely. All quantitative values null. Qualitative features based on well-documented conflict/economic
  collapse patterns: - Second Congo War years (1998-2003): crisis_gt_40pct (formal sector collapse) - Transition/recovery
  (2003-2010): very_high_25_40pct (formal sector rebuilding slowly) - Relative stability (2011-2015): very_high_25_40pct -
  Constitutional crisis/Kasai (2016-2018): crisis_gt_40pct - Tshisekedi era (2019-2023): very_high_25_40pct - AFC/M23 crisis
  (2024-2025): crisis_gt_40pct

  '
