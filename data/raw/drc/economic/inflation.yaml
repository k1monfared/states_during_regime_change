indicator: inflation
country: drc
dimension: economic
notes: >
  DRC inflation: extreme hyperinflation under Mobutu's final years (1990-1996).
  1990: ~81%; 1991: ~2154%; 1992: ~4130%; 1993: ~1987%; 1994: ~9796% (hyperinflation peak);
  1995: ~542%; 1996: ~616%. Kabila (1997): reduction begins ~176%. Second Congo War and
  transition: still elevated 30-135%. Post-war stabilization with IMF program: ~13% (2007).
  Under Kabila fiscal consolidation: 9-18% (2008-2015). Constitutional crisis 2016-2018:
  elevated to 30-54%. Tshisekedi era: 7-10% (2019-2023). AFC/M23 crisis 2024+: ~15-20%.
  Sources: World Bank WDI, IMF Article IV.
