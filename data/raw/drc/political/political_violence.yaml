indicator: political_violence
country: drc
dimension: political
notes: >
  DRC has experienced some of the world's highest political violence levels. Second Congo War
  1998-2003 killed an estimated 5.4 million people (direct and excess mortality). ACLED/UCDP
  data shows consistently high conflict deaths in eastern DRC. Key phases: First Congo War
  1996-1997 (~150K dead); Second Congo War 1998-2003 (catastrophic); post-war violence
  2004-2010 (high to severe); M23 2012-2013 (severe); ongoing armed groups 2014+ (high);
  M23 resurgence 2021+ (severe); AFC/M23 advance 2023-2024 (catastrophic in east).
  ACLED data for DRC 2016-2025 shows 3,000-20,000+ conflict fatalities per year.
