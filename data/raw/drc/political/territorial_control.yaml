indicator: territorial_control
country: drc
dimension: political
notes: >
  DRC (formerly Zaïre) has had severe territorial control challenges throughout the period.
  Mobutu era (1990-1996): nominal control but vast ungoverned spaces; economic collapse
  eroded state presence. AFDL rebellion 1996-1997 fragmented the country. Second Congo War
  1998-2003 split DRC among multiple foreign armies and armed factions — the deadliest
  conflict since WWII. Transitional period 2003-2006 with partial reintegration. First
  elections 2006 gave some legitimacy but east remained contested. M23 rebellion 2012-2013
  briefly captured Goma. Post-2013: dozens of armed groups (FDLR, ADF, Mai-Mai) operate
  in eastern DRC. M23 resurgence 2021+ backed by Rwanda, captured Goma Jan 2024, then
  Bukavu. As of 2025, eastern DRC under AFC/M23/Rwanda effective control.
