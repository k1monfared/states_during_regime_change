indicator: institutional_functioning
country: drc
dimension: political
notes: >
  DRC institutions have been severely degraded throughout the period. Mobutu era (1990-1996):
  kleptocratic single-party state with sham institutions. Transitional governments 1997-2006:
  collapsed to nominal under Second Congo War. First elections 2006 created some institutional
  legitimacy but parliament remained weak and courts subordinate. Joseph Kabila 2006-2018
  progressively weakened institutions; constitutional crisis 2016-2018 when he refused
  to step down. Tshisekedi 2019+ partial improvement but institutions remain severely degraded.
  Eastern DRC has had no functioning state institutions in many areas for decades.
  Freedom House scores DRC "Not Free" throughout; V-Dem shows consistently low scores.
