indicator: elite_cohesion
country: drc
dimension: political
notes: >
  DRC elite cohesion has been extremely low throughout the period. Mobutu maintained
  fragile cohesion through divide-and-rule but collapsed by 1996-1997. Kabila (L-D) ruled
  alone briefly before assassination 1997-2001. J Kabila slowly built a patronage coalition
  but this was always fragile; Second Congo War 1998-2003 had complete fragmentation.
  Post-war transition 2003-2006 had formal power-sharing (1+4) but ongoing tensions.
  Kabila 2006-2018 consolidated through patronage but faced constant elite defections
  (Nkunda/CNDP, M23, etc.). Constitutional crisis 2016-2018: elite fractured.
  Tshisekedi 2019: initially cohabitation with Kabila coalition, then broke with Sacred Union.
  Eastern DRC has continuous factional conflict among armed group leaders.
