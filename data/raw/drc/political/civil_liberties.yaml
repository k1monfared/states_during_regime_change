indicator: civil_liberties
country: drc
dimension: political
notes: >
  DRC civil liberties have been severely restricted throughout the period. Freedom House scores
  DRC as "Not Free" consistently, with CL scores of 6-7/7 (worst) throughout 1990-2025.
  Transformation: (8 - value) / 7 * 100. CL=7 → 14.3; CL=6 → 28.6; CL=5 → 42.9.
  Mobutu era: CL=7 (1990-1996). Second Congo War: CL=7. Post-war transition: CL=6 (2003-2006).
  Kabila era: CL=6 (2006-2018) with some variation. Tshisekedi: CL=6 (2019-2025).
  Sources: Freedom House Freedom in the World annual reports.
