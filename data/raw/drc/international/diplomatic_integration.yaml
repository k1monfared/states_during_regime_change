indicator: diplomatic_integration
country: drc
dimension: international
notes: >
  DRC diplomatic integration: complex history. Mobutu era (1990-1996): increasingly isolated
  as Western support waned with Cold War's end; IMF/WB programs suspended; but no formal
  diplomatic isolation. First Congo War (1996-1997): Western tacit support for Kabila/AFDL.
  Kabila (L-D) 1997: initially embraced by West but friction over war/killings.
  Second Congo War 1998-2003: DRC backed by Angola/Zimbabwe/Namibia; isolated from West
  somewhat; but as victim of invasion receives sympathy. Transitional period 2003-2006:
  full reintegration with international community. Post-2006: normal relations with tensions.
  Constitutional crisis 2016-2018: partial isolation (US/EU sanctions, aid cuts).
  Tshisekedi era: restored relations. 2022-2025: Rwanda-DRC crisis strains regional relations.
