indicator: sanctions
country: drc
dimension: international
notes: >
  DRC sanctions history:
  1990-2002: No formal international sanctions. Mobutu and Kabila eras had donor aid
  suspension and IMF/World Bank suspension but not formal UNSC sanctions.
  2003: UNSC arms embargo Resolution 1493 (July 2003) — limited arms embargo for eastern DRC
  and Ituri. Targeted individuals added later.
  2004: UNSC Resolution 1533 — DRC Sanctions Committee established; arms embargo extended.
  2005: UNSC Resolution 1596 — travel ban and assets freeze for designated individuals.
  2006 onwards: Targeted individual sanctions maintained (arms embargo + individual sanctions
  for armed group leaders, human rights violators). No broad economic sanctions.
  2024: Discussions about Rwanda sanctions but limited action taken by major powers.
