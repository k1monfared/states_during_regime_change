indicator: foreign_military
country: drc
dimension: international
notes: >
  DRC has had near-continuous foreign military presence since 1994. Key phases:
  1994-1996: No formal foreign forces but Rwandan/Ugandan backing of AFDL forms.
  1996-1997: First Congo War — Rwanda/Uganda invade with AFDL (invited/uninvited).
  1997-1998: Brief period with AFDL dissolved; some Rwandan/Ugandan troops remain.
  1998-2003: Second Congo War — Rwanda/Uganda (uninvited aggressor) + Angola/Zimbabwe/
  Namibia (invited by Kabila) all have troops on DRC soil; MONUC from 2000.
  2003-2006: MONUC transitional peacekeeping (15,000-17,000 troops).
  2006-2010: MONUC/MONUSCO ongoing peacekeeping.
  2010-2013: MONUSCO (renamed from MONUC 2010); up to 20,000 troops.
  2013: MONUSCO FIB (Force Intervention Brigade) — offensive mandate (Rwanda/Tanzania/
  South Africa); defeats M23 November 2013.
  2014-2021: MONUSCO 13,000-18,000 troops; UNderwhelming impact on armed groups.
  2021-2024: MONUSCO drawdown begins; Uganda UPDF enters DRC against ADF (invited 2021);
  EAC Regional Force 2022-2024; SADC SAMIDRC 2023-2024.
  2024: MONUSCO completes withdrawal; SADC force withdraws (AFC/M23 pressure); Rwanda
  forces (effectively with AFC/M23) hold eastern DRC — active foreign combat operations.
  2025: Rwanda forces hold eastern DRC through AFC/M23; ceasefire talks.
