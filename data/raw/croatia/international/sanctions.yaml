      reliability: null
    qualitative:
      assessment: |
        Croatia itself was not under international sanctions (sanctions were applied to
        the Federal Republic of Yugoslavia/Serbia). However, Croatia faced some international
        diplomatic criticism for human rights issues related to Operation Storm and the
        Krajina Serb displacement. EU and US also expressed concern about Croatia's role
        in Herzegovina (Herceg-Bosna). Croatia was not formally sanctioned but faced
        conditionalities from international institutions related to ICTY cooperation.
        Targeted_individuals_only most accurate — some individuals faced travel restrictions.
      features:
        - targeted_individuals_only
      sources:
        - citation: "UN Security Council, ICTY Cooperation Requirements 1995-1997"
          url: "https://un.org"
          type: government
          reliability: high
        - citation: "US State Department, Croatia Human Rights Report 1995"
          url: "https://state.gov"
          type: government
          reliability: high
      confidence: medium
      notes: "Croatia not formally sanctioned; but ICTY non-cooperation created diplomatic conditionalities."

