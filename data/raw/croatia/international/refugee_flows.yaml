        implementation proceeded. Croatia still hosting approximately 40,000-60,000
        Bosnian refugees. Minority Serb return process in Krajina very slow due to
        property restitution obstacles and hostile environment.
      features:
        - significant_outflows_1_3pct
      sources:
        - citation: "UNHCR Croatia 1997"
          url: "https://www.unhcr.org"
          type: international_organization
          reliability: medium
      confidence: medium
      notes: "UNTAES transition year; Bosnian refugee returns; Serb minority return obstacles"
