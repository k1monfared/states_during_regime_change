        access_date: null
      reliability: null
    qualitative:
      assessment: |
        Croatia under Tudjman was internationally isolated relative to its aspirations.
        While a UN member and recognized sovereign state, Croatia faced international
        criticism over Operation Storm (Krajina campaign), treatment of Serb minority,
        ICTY non-cooperation, and democratic deficits. Not admitted to Partnership for
        Peace. EU association delayed. Council of Europe membership pending (admitted 1996).
        Normal_minor_disputes status — recognized state conducting normal diplomacy but
        with significant bilateral tensions with Western states over democratic and
        humanitarian issues.
      features:
        - normal_minor_disputes
      sources:
        - citation: "US State Department, Croatia Country Report 1995"
          url: "https://state.gov"
          type: government
          reliability: high
        - citation: "European Commission, EU-Croatia Relations 1995"
          url: "https://ec.europa.eu"
          type: government
          reliability: high
      confidence: medium
      notes: "Croatia recognized but faced significant diplomatic obstacles due to ICTY non-cooperation and democratic deficits."

