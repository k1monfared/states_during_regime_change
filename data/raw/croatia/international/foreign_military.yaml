    qualitative:
      assessment: |
        Croatia had UN peacekeeping forces (UNCRO) deployed in Croatia, but these were
        there at Croatia's request and consent, not as an occupation or intervention against
        Croatian sovereignty. UNTAES was being planned for Eastern Slavonia following the
        Erdut Agreement. US military assistance and training was provided to Croatian armed
        forces (MPRI — Military Professional Resources Inc) but this was invited assistance.
        The UN forces were on Croatian soil with Croatian consent under international
        agreements. Foreign_forces_invited_or_un_peacekeeping.
      features:
        - significant_invited_forces
      sources:
        - citation: "UN, UNCRO mandate, 1995; Erdut Agreement 1995"
          url: "https://un.org"
          type: government
          reliability: high
      confidence: high
      notes: "UNCRO (later UNTAES) on Croatian territory at Croatia's invitation and UN authorization."

