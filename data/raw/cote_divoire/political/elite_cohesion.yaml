    quantitative:
      value: null
      unit: qualitative_scale
      source:
        citation: ICG Africa Reports on Cote d'Ivoire; qualitative analysis, 2009
        url: https://www.crisisgroup.org/africa/west-africa/cote-divoire
        access_date: '2026-03-01'
      reliability: medium
    qualitative:
      assessment: 'Elite cohesion was defined by deep structural fragmentation in 2009.

        The country had two effectively separate ruling elites: Gbagbo''s FPI-aligned

        southern government and Forces Nouvelles leadership (Guillaume Soro) in the

        north. Within the south, divisions between Gbagbo loyalists and those who

        favored negotiated settlement were significant. The Ouattara RDR was in

        political opposition, participating in government coalitions but marginalized.

        '
      features:
      - open_factional_conflict
      sources:
      - citation: ICG Africa Reports, Cote d'Ivoire 2009; qualitative country analysis
        url: https://www.crisisgroup.org/africa/west-africa/cote-divoire
        type: think_tank_report
        reliability: medium
      confidence: medium
      notes: Structural elite fragmentation; two separate governing centers; FPI vs FN vs RDR three-way
