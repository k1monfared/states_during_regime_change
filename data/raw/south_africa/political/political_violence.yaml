indicator: political_violence
country: south_africa
dimension: political
years:
  1990:
    data_status: complete
    quantitative:
      value: 3500
      unit: conflict_deaths_per_year
      source:
        citation: "UCDP Non-State Conflict Dataset; Human Rights Watch estimates"
        url: "https://ucdp.uu.se"
        access_date: "2025-01-01"
      reliability: medium
    qualitative:
      assessment: |
        Transitional violence at high levels. ANC unbanned February 1990; Mandela released.
        Political violence between ANC/UDF and Inkatha intensified especially in KwaZulu-Natal.
        Estimated 3,000–4,000 political deaths in 1990. Government-sponsored third-force
        violence suspected (later confirmed by TRC). Natal Midlands violence severe.
      features:
        - high_2000_10000
      sources:
        - citation: "TRC Final Report, Vol. 2; UCDP data"
          url: "https://www.justice.gov.za/trc"
          type: government
          reliability: high
      confidence: medium
      notes: "TRC documented approximately 14,000 political deaths 1990-1994; high uncertainty for individual years"
  1991:
    data_status: complete
    quantitative:
      value: 2700
      unit: conflict_deaths_per_year
      source:
        citation: "UCDP Non-State Conflict Dataset; TRC Final Report"
        url: "https://ucdp.uu.se"
        access_date: "2025-01-01"
      reliability: medium
    qualitative:
      assessment: |
        Continued high political violence despite peace accords. National Peace Accord signed
        September 1991 aimed to reduce inter-party violence. ANC-Inkatha clashes ongoing in
        KwaZulu-Natal and Transvaal townships. Estimated 2,500-3,000 political deaths.
        Third-force operations (death squads) continuing.
      features:
        - moderate_500_2000
      sources:
        - citation: "TRC Final Report Vol. 2; Human Rights Watch, South Africa 1992"
          url: "https://www.justice.gov.za/trc"
          type: government
          reliability: high
      confidence: medium
      notes: null
  1992:
    data_status: complete
    quantitative:
      value: 3800
      unit: conflict_deaths_per_year
      source:
        citation: "UCDP; TRC Final Report; Human Rights Watch"
        url: "https://ucdp.uu.se"
        access_date: "2025-01-01"
      reliability: medium
    qualitative:
      assessment: |
        Peak transitional violence. Boipatong massacre (June 1992, 46 killed) and Bisho
        massacre (September 1992, 28 killed). ANC suspended CODESA talks temporarily. Violence
        in KwaZulu-Natal estimated at 2,000+ deaths alone. Total political deaths estimated
        3,500-4,000. Third-force violence documented in later TRC hearings.
      features:
        - high_2000_10000
      sources:
        - citation: "TRC Final Report Vol. 2; UCDP Non-State Conflict"
          url: "https://www.justice.gov.za/trc"
          type: government
          reliability: high
      confidence: medium
      notes: "1992 peak political violence year before 1994 elections"
  1993:
    data_status: complete
    quantitative:
      value: 3000
      unit: conflict_deaths_per_year
      source:
        citation: "UCDP; TRC Final Report"
        url: "https://ucdp.uu.se"
        access_date: "2025-01-01"
      reliability: medium
    qualitative:
      assessment: |
        High violence continued despite CODESA agreements. Chris Hani assassinated April 1993
        (nearly derailed negotiations). AWB right-wing terrorism increased. Violence declined
        somewhat in second half of 1993 as elections agreed. Estimated 2,500-3,500 political deaths.
      features:
        - high_2000_10000
      sources:
        - citation: "TRC Final Report Vol. 2; Human Rights Watch, South Africa 1994"
          url: "https://www.justice.gov.za/trc"
          type: government
          reliability: high
      confidence: medium
      notes: null
  1994:
    data_status: complete
    quantitative:
      value: 1000
      unit: conflict_deaths_per_year
      source:
        citation: "TRC Final Report; UCDP data"
        url: "https://www.justice.gov.za/trc"
        access_date: "2025-01-01"
      reliability: medium
    qualitative:
      assessment: |
        Significant decline in political violence as elections approached. Bombing campaign by
        AWB right-wing (24 killed in election week). Elections conducted April 26-29 with
        some violence in KwaZulu-Natal but broadly peaceful. Post-election period saw rapid
        decline in political deaths as new government formed. Estimated 800-1,200 political deaths.
      features:
        - moderate_500_2000
      sources:
        - citation: "TRC Final Report; Freedom House, Freedom in the World 1995"
          url: "https://www.justice.gov.za/trc"
          type: government
          reliability: high
      confidence: medium
      notes: "Regime change year; dramatic decline in political violence after April elections"
  1995:
