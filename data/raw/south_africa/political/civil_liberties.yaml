      unit: freedom_house_inverted
      source:
        citation: "Freedom House, Freedom in the World 1991 — South Africa (Civil Liberties score)"
        url: "https://freedomhouse.org"
        access_date: "2025-01-01"
      reliability: high
    qualitative:
      assessment: |
        Severely restricted civil liberties for Black majority under apartheid. ANC unbanned
        February 1990; Mandela released. State of Emergency lifted (June 1990). But racial
        pass laws, Group Areas Act, Population Registration Act still in force. Political
        freedoms severely restricted. Freedom House rated South Africa 5 (Civil Liberties)
        in 1991 on 1-7 scale (1=best, 7=worst).
      features:
        - severe_restrictions
      sources:
        - citation: "Freedom House, Freedom in the World 1991 — South Africa"
          url: "https://freedomhouse.org"
          type: ngo_report
          reliability: high
      confidence: high
      notes: "Apartheid-era: severe restrictions for Black majority despite partial reforms"
