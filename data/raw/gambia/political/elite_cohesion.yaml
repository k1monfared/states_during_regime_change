    qualitative:
      assessment: |
        Elite cohesion under Jammeh in 2005 was characterized by enforced
        unity through fear. Jammeh consolidated power after the 1994 coup
        and maintained control through purges of perceived rivals. The
        ruling APRC coalition was stable but based on coercion. No public
        elite factionalism visible.
      features:
      - stable_unified_governance
      sources:
      - citation: "Freedom House, Freedom in the World 2006, The Gambia"
        url: "https://freedomhouse.org/country/gambia/freedom-world/2006"
        type: ngo_report
        reliability: medium
      confidence: medium
      notes: "Stability through coercion; regular purges of perceived rivals"
