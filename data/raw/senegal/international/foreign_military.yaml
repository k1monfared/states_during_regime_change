    qualitative:
      assessment: |
        Following the March 2024 election of Faye, the new Faye/Sonko government announced
        the closure of French military bases in Senegal, including the Dakar naval base,
        as part of a sovereignty-centered foreign policy. France confirmed this in
        November 2024. The bases were being wound down by year-end 2024, marking a
        significant shift in Senegal's foreign military posture from invited limited
        presence to no foreign presence.
      features:
      - limited_invited_advisors
      sources:
      - citation: "Reuters: Senegal to close French military bases, November 2024; French Ministry of Defense confirmation"
        url:
        type: news_media
        reliability: high
      confidence: high
      notes: "Transition year: bases announced for closure but not yet fully evacuated by end-2024. Coded as limited_invited_advisors reflecting the actual physical status during most of 2024."
  2025:
    data_status: complete
    quantitative:
      value:
      unit: qualitative_scale
      source:
