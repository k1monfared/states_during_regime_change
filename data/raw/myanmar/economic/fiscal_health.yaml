    qualitative:
      assessment: |
        Myanmar under military junta had opaque fiscal management. Large fiscal deficits
        monetized through central bank printing. Public debt data unreliable. Natural gas
        revenues from Yadana and Yetagun fields accrued to military-controlled entities
        outside the regular budget. Fiscal system severely dysfunctional.
      features:
      - large_deficit_high_90_120pct
      sources:
      - citation: "IMF Myanmar Article IV Consultations (historical)"
        url: "https://www.imf.org/en/countries/MMR"
        type: international_organization
        reliability: medium
      confidence: low
      notes: "Junta fiscal data unreliable; deficits monetized; off-budget military revenues not captured"
