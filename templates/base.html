<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Data Audit{% endblock %} — Regime Change Analysis</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Inter', system-ui, sans-serif; font-size: 13px; color: #1a1a1a; background: #f8f9fa; }
  .nav { background: #1e293b; color: #e2e8f0; padding: 10px 20px; display: flex; align-items: center; gap: 16px; }
  .nav a { color: #94a3b8; text-decoration: none; font-size: 12px; }
  .nav a:hover, .nav a.active { color: #f8fafc; }
  .nav-title { font-weight: 600; color: #f8fafc; margin-right: 8px; }
  .container { max-width: 1400px; margin: 0 auto; padding: 16px 20px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
  h2 { font-size: 16px; font-weight: 600; margin: 16px 0 8px; }
  h3 { font-size: 13px; font-weight: 600; margin: 12px 0 6px; }
  .stats-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px 16px; }
  .stat { display: flex; flex-direction: column; }
  .stat-value { font-size: 22px; font-weight: 700; color: #1e293b; }
  .stat-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.04em; }
  table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
  th { background: #f1f5f9; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 10px; text-align: left; border-bottom: 1px solid #e2e8f0; color: #475569; }
  td { padding: 6px 10px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }
  .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .badge-available { background: #dcfce7; color: #166534; }
  .badge-gap { background: #fef9c3; color: #854d0e; }
  .badge-error { background: #fee2e2; color: #991b1b; }
  .badge-manual { background: #e0e7ff; color: #3730a3; }
  .badge-not-downloaded { background: #f1f5f9; color: #64748b; }
  .coverage-high { color: #166534; font-weight: 600; }
  .coverage-mid { color: #854d0e; font-weight: 600; }
  .coverage-low { color: #991b1b; font-weight: 600; }
  .btn { display: inline-block; padding: 5px 12px; border: 1px solid #d1d5db; border-radius: 5px; cursor: pointer; font-size: 12px; background: #fff; color: #374151; text-decoration: none; }
  .btn:hover { background: #f9fafb; }
  .btn-primary { background: #3b82f6; color: #fff; border-color: #2563eb; }
  .btn-primary:hover { background: #2563eb; }
  .btn-verify { background: #10b981; color: #fff; border-color: #059669; font-size: 11px; padding: 3px 8px; }
  .btn-verify:hover { background: #059669; }
  .verified-check { color: #10b981; font-size: 14px; }
  a { color: #2563eb; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .back-link { font-size: 12px; color: #64748b; margin-bottom: 12px; display: block; }
  .priority-1 { color: #1e40af; font-weight: 600; }
  .priority-2 { color: #374151; }
  .priority-3 { color: #9ca3af; }
  .source-tag { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; background: #dbeafe; color: #1e40af; margin-left: 4px; }
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<nav class="nav">
  <span class="nav-title">Data Audit</span>
  <a href="/audit" {% if request.path == '/audit' %}class="active"{% endif %}>Coverage</a>
  <a href="/audit/gaps" {% if request.path == '/audit/gaps' %}class="active"{% endif %}>Gaps</a>
  <a href="/api/coverage">Coverage JSON</a>
  <span style="margin-left:auto;font-size:11px;color:#475569">Regime Change Analysis — Data Management</span>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>

<script>
function verifyObservation(seriesId, countryId, year, btn) {
  fetch('/api/verify', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({series_id: seriesId, country_id: countryId, year: year})
  }).then(r => r.json()).then(data => {
    if (data.status === 'verified') {
      btn.textContent = '✓';
      btn.classList.remove('btn-verify');
      btn.classList.add('verified-check');
      btn.disabled = true;
    }
  });
}
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
